            range:
              start: { line: 4, character: 17 }
              end: { line: 4, character: 25 }
          kind: interface
          displayName: IHandler
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-22. handler has the declared
        static type IHandler, so handler.Handle is a usage of the interface
        member and must not be attributed to ConsoleHandler.Handle. The
        interface member has no body, so reverse navigation is explicitly to
        its declaration. The original call remains a one-implementation
        control, while PolymorphismConsumer adds a runtime branch between
        ConsoleHandler and BufferHandler; its handler local still has the
        static type IHandler, which type-definition lookup explicitly checks.
        Parity source: dotnet/roslyn@a5accec75c395ff60afbfb77aa630df8d9b75342.
        Upstream reference: Roslyn LanguageServerProtocol definition, references, and implementation tests for interface methods.
        Adapted fixture: fixtures/csharp/lsp-parity/.
        Maturity: handler.Handle is called through an IHandler-typed local and
        should resolve to the interface method declaration.
