        displayName: tax_rate
    usageLookups:
      - usage:
          location:
            uri: benchmark://source/app/catalog.rb
            range:
              start: { line: 10, character: 14 }
              end: { line: 10, character: 22 }
          kind: method
          displayName: tax_rate
        expectedDeclaration:
          location:
            uri: benchmark://source/lib/shop/pricing.rb
            range:
              start: { line: 4, character: 8 }
              end: { line: 4, character: 16 }
          kind: method
          displayName: tax_rate
    verification:
      method: analyzer_comparison
      notes: >
        Parity source: Shopify/ruby-lsp@3f3121bb908a847d712aba2a7ebc333eca186469.
        Upstream reference: lib/ruby_indexer/test/method_test.rb::test_module_function_with_no_arguments.
        Adapted fixture: fixtures/ruby/lsp-parity/.
        Maturity: module_function should expose following instance methods as callable singleton methods on the module.
