schemaVersion: 2
corpus:
  partition: development
  selection: analyzer_informed
groundTruth:
  status: legacy_unattributed
  reviewers: []
referencePolicy: bindings_optional
positionEncoding: utf-16
source:
  kind: fixture
  path: fixtures/csharp/baseline
language: csharp
cases:
  - id: csharp-class-reference
    declaration:
      location:
        uri: benchmark://source/src/Service.cs
        range:
          start: { line: 18, character: 13 }
          end: { line: 18, character: 20 }
      kind: class
      displayName: Service
    expectedUsages:
      - location:
          uri: benchmark://source/src/Consumer.cs
          range:
            start: { line: 7, character: 8 }
            end: { line: 7, character: 15 }
        kind: class
        displayName: Service
      - location:
          uri: benchmark://source/src/Consumer.cs
          range:
            start: { line: 7, character: 30 }
            end: { line: 7, character: 37 }
        kind: constructor
        displayName: Service
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/Consumer.cs
            range:
              start: { line: 7, character: 8 }
              end: { line: 7, character: 15 }
          kind: class
          displayName: Service
        expectedDeclaration:
          location:
            uri: benchmark://source/src/Service.cs
            range:
              start: { line: 18, character: 13 }
              end: { line: 18, character: 20 }
          kind: class
          displayName: Service
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-21. Service is used as both
        the explicit local variable type and the type named by the construction
        expression in Consumer.Run. The construction token also participates
        in the separate constructor case. Definition navigation from the
        explicit type reaches the class body.
  - id: csharp-constructor-call
    declaration:
      location:
        uri: benchmark://source/src/Service.cs
        range:
          start: { line: 22, character: 11 }
          end: { line: 22, character: 18 }
      kind: constructor
      displayName: Service
    expectedUsages:
      - location:
          uri: benchmark://source/src/Consumer.cs
          range:
            start: { line: 7, character: 30 }
            end: { line: 7, character: 37 }
        kind: constructor
        displayName: Service
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/Consumer.cs
            range:
              start: { line: 7, character: 30 }
              end: { line: 7, character: 37 }
          kind: constructor
          displayName: Service
        expectedDeclaration:
          location:
            uri: benchmark://source/src/Service.cs
            range:
              start: { line: 22, character: 11 }
              end: { line: 22, character: 18 }
          kind: constructor
          displayName: Service
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-21. The Service token in new
        Service(repository) invokes the constructor and is the required usage;
        the class declaration and explicit local variable type do not invoke
        it. Definition navigation reaches the matching constructor body.
  - id: csharp-method-call
    declaration:
      location:
        uri: benchmark://source/src/Service.cs
        range:
          start: { line: 27, character: 18 }
          end: { line: 27, character: 25 }
      kind: method
      displayName: Execute
    expectedUsages:
      - location:
          uri: benchmark://source/src/Consumer.cs
          range:
            start: { line: 8, character: 29 }
            end: { line: 8, character: 36 }
        kind: method
        displayName: Execute
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/Consumer.cs
            range:
              start: { line: 8, character: 29 }
              end: { line: 8, character: 36 }
          kind: method
          displayName: Execute
        expectedDeclaration:
          location:
            uri: benchmark://source/src/Service.cs
            range:
              start: { line: 27, character: 18 }
              end: { line: 27, character: 25 }
          kind: method
          displayName: Execute
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-21. Consumer.Run calls the
        non-virtual Execute method through a receiver whose static type is
        Service, so the call has one exact method identity. Definition
        navigation reaches the Execute body.
  - id: csharp-repository-method-call
    declaration:
      location:
        uri: benchmark://source/src/Service.cs
        range:
          start: { line: 11, character: 18 }
          end: { line: 11, character: 22 }
      kind: method
      displayName: Save
    expectedUsages:
      - location:
          uri: benchmark://source/src/Service.cs
          range:
            start: { line: 29, character: 32 }
            end: { line: 29, character: 36 }
        kind: method
        displayName: Save
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/Service.cs
            range:
              start: { line: 29, character: 32 }
              end: { line: 29, character: 36 }
          kind: method
          displayName: Save
        expectedDeclaration:
          location:
            uri: benchmark://source/src/Service.cs
            range:
              start: { line: 11, character: 18 }
              end: { line: 11, character: 22 }
          kind: method
          displayName: Save
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-21. Service.Execute calls the
        non-virtual Save method through a receiver whose static type is
        Repository, giving the call one exact method identity. Definition
        navigation reaches the Save body.
  - id: csharp-property-access
    declaration:
      location:
        uri: benchmark://source/src/Service.cs
        range:
          start: { line: 9, character: 18 }
          end: { line: 9, character: 22 }
      kind: property
      displayName: Last
    expectedUsages:
      - location:
          uri: benchmark://source/src/Service.cs
          range:
            start: { line: 13, character: 8 }
            end: { line: 13, character: 12 }
        kind: property
        displayName: Last
      - location:
          uri: benchmark://source/src/Service.cs
          range:
            start: { line: 14, character: 15 }
            end: { line: 14, character: 19 }
        kind: property
        displayName: Last
      - location:
          uri: benchmark://source/src/Consumer.cs
          range:
            start: { line: 9, character: 53 }
            end: { line: 9, character: 57 }
        kind: property
        displayName: Last
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/Consumer.cs
            range:
              start: { line: 9, character: 53 }
              end: { line: 9, character: 57 }
          kind: property
          displayName: Last
        expectedDeclaration:
          location:
            uri: benchmark://source/src/Service.cs
            range:
              start: { line: 9, character: 18 }
              end: { line: 9, character: 22 }
          kind: property
          displayName: Last
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-21. Last is written through
        its setter and read through its getter in Repository.Save, then read
        through its getter in Consumer.Run. These are all references to the
        property symbol; the property declaration is excluded. With no
        separate authored accessor body, definition navigation reaches the
        auto-property token.
  - id: csharp-constant-access
    declaration:
      location:
        uri: benchmark://source/src/Service.cs
        range:
          start: { line: 4, character: 24 }
          end: { line: 4, character: 30 }
      kind: constant
      displayName: Prefix
    expectedUsages:
      - location:
          uri: benchmark://source/src/Service.cs
          range:
            start: { line: 30, character: 27 }
            end: { line: 30, character: 33 }
        kind: constant
        displayName: Prefix
      - location:
          uri: benchmark://source/src/Consumer.cs
          range:
            start: { line: 9, character: 24 }
            end: { line: 9, character: 30 }
        kind: constant
        displayName: Prefix
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/Consumer.cs
            range:
              start: { line: 9, character: 24 }
              end: { line: 9, character: 30 }
          kind: constant
          displayName: Prefix
        expectedDeclaration:
          location:
            uri: benchmark://source/src/Service.cs
            range:
              start: { line: 4, character: 24 }
              end: { line: 4, character: 30 }
          kind: constant
          displayName: Prefix
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-21. Prefix is defined by its
        initialized const declarator and read once from Service.Execute and
        once from Consumer.Run. The declarator token is excluded from usages;
        definition navigation from a read reaches that identifier.
