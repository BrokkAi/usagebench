schemaVersion: 2
corpus:
  partition: development
  selection: analyzer_informed
groundTruth:
  status: legacy_unattributed
  reviewers: []
referencePolicy: bindings_optional
positionEncoding: utf-16
source:
  kind: fixture
  path: fixtures/php/baseline
language: php
cases:
  - id: php-class-construction
    declaration:
      location:
        uri: benchmark://source/src/Service.php
        range:
          start: { line: 20, character: 12 }
          end: { line: 20, character: 19 }
      kind: class
      displayName: Service
    expectedUsages:
      - location:
          uri: benchmark://source/src/Consumer.php
          range:
            start: { line: 9, character: 23 }
            end: { line: 9, character: 30 }
        kind: constructor
        displayName: Service
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/Consumer.php
            range:
              start: { line: 9, character: 23 }
              end: { line: 9, character: 30 }
          kind: constructor
          displayName: Service
        expectedDeclaration:
          location:
            uri: benchmark://source/src/Service.php
            range:
              start: { line: 20, character: 12 }
              end: { line: 20, character: 19 }
          kind: class
          displayName: Service
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-22. Service in new
        Service($repository) is the required constructor-call usage while also
        naming the Service class. Definition navigation canonically targets the
        Service class token because that is the visible cursor identity.
        __construct is the eventual control-flow target and is a reasonable
        secondary navigation result, but it has a distinct source name.
        Repository and local-variable tokens are separate identities.
        Intelephense 1.18.5 returned the exact construction usage and both the
        class token and __construct for definition navigation; the strict
        singleton lookup therefore reports multiple_targets.
  - id: php-method-call
    declaration:
      location:
        uri: benchmark://source/src/Service.php
        range:
          start: { line: 26, character: 20 }
          end: { line: 26, character: 27 }
      kind: method
      displayName: execute
    expectedUsages:
      - location:
          uri: benchmark://source/src/Consumer.php
          range:
            start: { line: 10, character: 28 }
            end: { line: 10, character: 35 }
        kind: method
        displayName: execute
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/Consumer.php
            range:
              start: { line: 10, character: 28 }
              end: { line: 10, character: 35 }
          kind: method
          displayName: execute
        expectedDeclaration:
          location:
            uri: benchmark://source/src/Service.php
            range:
              start: { line: 26, character: 20 }
              end: { line: 26, character: 27 }
          kind: method
          displayName: execute
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-22. Consumer::run calls
        execute on a directly constructed Service local that is not reassigned,
        so the receiver and method target are exact. Definition navigation
        targets the Service::execute method body. Service, save, PREFIX, and
        receiver-variable tokens retain separate identities. Intelephense
        1.18.5 returned the exact usage and definition target.
  - id: php-repository-method-call
    declaration:
      location:
        uri: benchmark://source/src/Service.php
        range:
          start: { line: 13, character: 20 }
          end: { line: 13, character: 24 }
      kind: method
      displayName: save
    expectedUsages:
      - location:
          uri: benchmark://source/src/Service.php
          range:
            start: { line: 28, character: 37 }
            end: { line: 28, character: 41 }
        kind: method
        displayName: save
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/Service.php
            range:
              start: { line: 28, character: 37 }
              end: { line: 28, character: 41 }
          kind: method
          displayName: save
        expectedDeclaration:
          location:
            uri: benchmark://source/src/Service.php
            range:
              start: { line: 13, character: 20 }
              end: { line: 13, character: 24 }
          kind: method
          displayName: save
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-22. Service::execute calls save
        through the constructor-promoted repository property, whose declared
        type is the final Repository class. With no interface or alternate
        implementation, dispatch is exact and definition navigation targets
        the Repository::save method body. Property, parameter, and type tokens
        are separate identities. Intelephense 1.18.5 returned the exact usage
        and definition target.
  - id: php-property-access
    declaration:
      location:
        uri: benchmark://source/src/Service.php
        range:
          start: { line: 11, character: 18 }
          end: { line: 11, character: 23 }
      kind: property
      displayName: $last
    expectedUsages:
      - location:
          uri: benchmark://source/src/Service.php
          range:
            start: { line: 15, character: 15 }
            end: { line: 15, character: 19 }
        kind: property
        displayName: last
      - location:
          uri: benchmark://source/src/Service.php
          range:
            start: { line: 16, character: 22 }
            end: { line: 16, character: 26 }
        kind: property
        displayName: last
      - location:
          uri: benchmark://source/src/Consumer.php
          range:
            start: { line: 11, character: 57 }
            end: { line: 11, character: 61 }
        kind: property
        displayName: last
    usageLookups:
      - operation: declaration
        usage:
          location:
            uri: benchmark://source/src/Consumer.php
            range:
              start: { line: 11, character: 57 }
              end: { line: 11, character: 61 }
          kind: property
          displayName: last
        expectedDeclaration:
          location:
            uri: benchmark://source/src/Service.php
            range:
              start: { line: 11, character: 18 }
              end: { line: 11, character: 23 }
          kind: property
          displayName: $last
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-22. Repository::$last is
        written and read in save, then read through an exact Repository local
        in Consumer::run. The initialized property declarator is not counted
        again as a usage. Declaration navigation targets the $last property
        declarator because the property has no separate executable definition
        body. Intelephense 1.18.5 returned all three usages exactly but does not
        advertise textDocument/declaration. A non-scored definition probe
        reached the same property declarator with the full PHP $last token.
        Following the reviewer decision for PHP token consistency, this
        declaration range includes the sigil while the syntactically
        sigil-free ->last access ranges continue to select last.
  - id: php-constant-access
    declaration:
      location:
        uri: benchmark://source/src/Service.php
        range:
          start: { line: 6, character: 17 }
          end: { line: 6, character: 23 }
      kind: constant
      displayName: PREFIX
    expectedUsages:
      - location:
          uri: benchmark://source/src/Service.php
          range:
            start: { line: 29, character: 25 }
            end: { line: 29, character: 31 }
        kind: constant
        displayName: PREFIX
      - location:
          uri: benchmark://source/src/Consumer.php
          range:
            start: { line: 11, character: 25 }
            end: { line: 11, character: 31 }
        kind: constant
        displayName: PREFIX
    usageLookups:
      - operation: declaration
        usage:
          location:
            uri: benchmark://source/src/Consumer.php
            range:
              start: { line: 11, character: 25 }
              end: { line: 11, character: 31 }
          kind: constant
          displayName: PREFIX
        expectedDeclaration:
          location:
            uri: benchmark://source/src/Service.php
            range:
              start: { line: 6, character: 17 }
              end: { line: 6, character: 23 }
          kind: constant
          displayName: PREFIX
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-22. Defaults::PREFIX is read
        once in Service::execute and once in Consumer::run. The Defaults
        qualifiers are separate class usages, and the constant initializer
        does not create an executable definition body. Declaration navigation
        targets the PREFIX constant declarator. Intelephense 1.18.5 returned
        both usages exactly but does not advertise textDocument/declaration; a
        non-scored definition probe reached the same PREFIX token exactly.
