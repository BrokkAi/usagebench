schemaVersion: 1
positionEncoding: utf-16
source:
  kind: fixture
  path: fixtures/php/baseline
language: php
cases:
  - id: php-class-construction
    declaration:
      location:
        uri: benchmark://source/src/Service.php
        range:
          start: { line: 20, character: 12 }
          end: { line: 20, character: 19 }
      kind: class
      displayName: Service
    expectedUsages:
      - location:
          uri: benchmark://source/src/Consumer.php
          range:
            start: { line: 9, character: 23 }
            end: { line: 9, character: 30 }
        kind: constructor
        displayName: Service
    usageLookups:
      - usage:
          location:
            uri: benchmark://source/src/Consumer.php
            range:
              start: { line: 9, character: 23 }
              end: { line: 9, character: 30 }
          kind: constructor
          displayName: Service
        expectedDeclaration:
          location:
            uri: benchmark://source/src/Service.php
            range:
              start: { line: 20, character: 12 }
              end: { line: 20, character: 19 }
          kind: class
          displayName: Service
    verification:
      method: manual_inspection
      notes: Consumer::run constructs Service with a Repository instance.
  - id: php-method-call
    declaration:
      location:
        uri: benchmark://source/src/Service.php
        range:
          start: { line: 26, character: 20 }
          end: { line: 26, character: 27 }
      kind: method
      displayName: execute
    expectedUsages:
      - location:
          uri: benchmark://source/src/Consumer.php
          range:
            start: { line: 10, character: 28 }
            end: { line: 10, character: 35 }
        kind: method
        displayName: execute
    usageLookups:
      - usage:
          location:
            uri: benchmark://source/src/Consumer.php
            range:
              start: { line: 10, character: 28 }
              end: { line: 10, character: 35 }
          kind: method
          displayName: execute
        expectedDeclaration:
          location:
            uri: benchmark://source/src/Service.php
            range:
              start: { line: 26, character: 20 }
              end: { line: 26, character: 27 }
          kind: method
          displayName: execute
    verification:
      method: manual_inspection
      notes: Consumer::run calls execute on the constructed Service instance.
  - id: php-repository-method-call
    declaration:
      location:
        uri: benchmark://source/src/Service.php
        range:
          start: { line: 13, character: 20 }
          end: { line: 13, character: 24 }
      kind: method
      displayName: save
    expectedUsages:
      - location:
          uri: benchmark://source/src/Service.php
          range:
            start: { line: 28, character: 37 }
            end: { line: 28, character: 41 }
        kind: method
        displayName: save
    usageLookups:
      - usage:
          location:
            uri: benchmark://source/src/Service.php
            range:
              start: { line: 28, character: 37 }
              end: { line: 28, character: 41 }
          kind: method
          displayName: save
        expectedDeclaration:
          location:
            uri: benchmark://source/src/Service.php
            range:
              start: { line: 13, character: 20 }
              end: { line: 13, character: 24 }
          kind: method
          displayName: save
    verification:
      method: manual_inspection
      notes: Service::execute calls save on its Repository dependency.
  - id: php-property-access
    declaration:
      location:
        uri: benchmark://source/src/Service.php
        range:
          start: { line: 11, character: 19 }
          end: { line: 11, character: 23 }
      kind: property
      displayName: last
    expectedUsages:
      - location:
          uri: benchmark://source/src/Service.php
          range:
            start: { line: 15, character: 15 }
            end: { line: 15, character: 19 }
        kind: property
        displayName: last
      - location:
          uri: benchmark://source/src/Service.php
          range:
            start: { line: 16, character: 22 }
            end: { line: 16, character: 26 }
        kind: property
        displayName: last
      - location:
          uri: benchmark://source/src/Consumer.php
          range:
            start: { line: 11, character: 57 }
            end: { line: 11, character: 61 }
        kind: property
        displayName: last
    usageLookups:
      - usage:
          location:
            uri: benchmark://source/src/Consumer.php
            range:
              start: { line: 11, character: 57 }
              end: { line: 11, character: 61 }
          kind: property
          displayName: last
        expectedDeclaration:
          location:
            uri: benchmark://source/src/Service.php
            range:
              start: { line: 11, character: 19 }
              end: { line: 11, character: 23 }
          kind: property
          displayName: last
    verification:
      method: manual_inspection
      notes: Repository::$last is assigned and read in save, then read by Consumer::run.
  - id: php-constant-access
    declaration:
      location:
        uri: benchmark://source/src/Service.php
        range:
          start: { line: 6, character: 17 }
          end: { line: 6, character: 23 }
      kind: constant
      displayName: PREFIX
    expectedUsages:
      - location:
          uri: benchmark://source/src/Service.php
          range:
            start: { line: 29, character: 25 }
            end: { line: 29, character: 31 }
        kind: constant
        displayName: PREFIX
      - location:
          uri: benchmark://source/src/Consumer.php
          range:
            start: { line: 11, character: 25 }
            end: { line: 11, character: 31 }
        kind: constant
        displayName: PREFIX
    usageLookups:
      - usage:
          location:
            uri: benchmark://source/src/Consumer.php
            range:
              start: { line: 11, character: 25 }
              end: { line: 11, character: 31 }
          kind: constant
          displayName: PREFIX
        expectedDeclaration:
          location:
            uri: benchmark://source/src/Service.php
            range:
              start: { line: 6, character: 17 }
              end: { line: 6, character: 23 }
          kind: constant
          displayName: PREFIX
    verification:
      method: manual_inspection
      notes: Defaults::PREFIX is declared in Service.php and read from Service::execute and Consumer::run.
