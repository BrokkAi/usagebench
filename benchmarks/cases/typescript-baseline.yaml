schemaVersion: 1
positionEncoding: utf-16
source:
  kind: fixture
  path: fixtures/typescript/baseline
language: typescript
cases:
  - id: ts-named-export-import-function
    expectedFailure:
      reason: Bifrost baseline misses one or more expected declaration-to-usage sites.
    declaration:
      location:
        uri: benchmark://source/src/components.tsx
        range:
          start: { line: 6, character: 16 }
          end: { line: 6, character: 26 }
      kind: function
      displayName: formatName
    expectedUsages:
      - location:
          uri: benchmark://source/src/components.tsx
          range:
            start: { line: 18, character: 29 }
            end: { line: 18, character: 39 }
        kind: function
        displayName: formatName
      - location:
          uri: benchmark://source/src/app.tsx
          range:
            start: { line: 0, character: 46 }
            end: { line: 0, character: 56 }
        kind: function
        displayName: formatName
      - location:
          uri: benchmark://source/src/app.tsx
          range:
            start: { line: 5, character: 14 }
            end: { line: 5, character: 24 }
        kind: function
        displayName: formatName
    usageLookups:
      - usage:
          location:
            uri: benchmark://source/src/app.tsx
            range:
              start: { line: 5, character: 14 }
              end: { line: 5, character: 24 }
          kind: function
          displayName: formatName
        expectedDeclaration:
          location:
            uri: benchmark://source/src/components.tsx
            range:
              start: { line: 6, character: 16 }
              end: { line: 6, character: 26 }
          kind: function
          displayName: formatName
    verification:
      method: manual_inspection
      notes: formatName is exported from components, imported by app, and called from both fixtures.
  - id: ts-default-class-import-and-construction
    expectedFailure:
      reason: Bifrost baseline misses one or more expected declaration-to-usage sites.
    declaration:
      location:
        uri: benchmark://source/src/components.tsx
        range:
          start: { line: 10, character: 21 }
          end: { line: 10, character: 28 }
      kind: class
      displayName: Greeter
    expectedUsages:
      - location:
          uri: benchmark://source/src/components.tsx
          range:
            start: { line: 23, character: 22 }
            end: { line: 23, character: 29 }
        kind: constructor
        displayName: Greeter
      - location:
          uri: benchmark://source/src/app.tsx
          range:
            start: { line: 0, character: 7 }
            end: { line: 0, character: 14 }
        kind: class
        displayName: Greeter
      - location:
          uri: benchmark://source/src/app.tsx
          range:
            start: { line: 3, character: 20 }
            end: { line: 3, character: 27 }
        kind: constructor
        displayName: Greeter
    usageLookups:
      - usage:
          location:
            uri: benchmark://source/src/app.tsx
            range:
              start: { line: 3, character: 20 }
              end: { line: 3, character: 27 }
          kind: constructor
          displayName: Greeter
        expectedDeclaration:
          location:
            uri: benchmark://source/src/components.tsx
            range:
              start: { line: 10, character: 21 }
              end: { line: 10, character: 28 }
          kind: class
          displayName: Greeter
    verification:
      method: manual_inspection
      notes: Greeter is the default export and is constructed in both components and app fixtures.
  - id: ts-class-method-call
    expectedFailure:
      reason: Bifrost baseline misses one or more expected declaration-to-usage sites.
    declaration:
      location:
        uri: benchmark://source/src/components.tsx
        range:
          start: { line: 17, character: 2 }
          end: { line: 17, character: 7 }
      kind: method
      displayName: greet
    expectedUsages:
      - location:
          uri: benchmark://source/src/components.tsx
          range:
            start: { line: 24, character: 27 }
            end: { line: 24, character: 32 }
        kind: method
        displayName: greet
      - location:
          uri: benchmark://source/src/app.tsx
          range:
            start: { line: 4, character: 24 }
            end: { line: 4, character: 29 }
        kind: method
        displayName: greet
    usageLookups:
      - usage:
          location:
            uri: benchmark://source/src/app.tsx
            range:
              start: { line: 4, character: 24 }
              end: { line: 4, character: 29 }
          kind: method
          displayName: greet
        expectedDeclaration:
          location:
            uri: benchmark://source/src/components.tsx
            range:
              start: { line: 17, character: 2 }
              end: { line: 17, character: 7 }
          kind: method
          displayName: greet
    verification:
      method: manual_inspection
      notes: greet is declared on Greeter and called from both the TSX component and app fixture.
  - id: ts-object-property-access
    expectedFailure:
      reason: Bifrost baseline cannot resolve this property declaration before scanning usages.
    declaration:
      location:
        uri: benchmark://source/src/components.tsx
        range:
          start: { line: 3, character: 2 }
          end: { line: 3, character: 6 }
      kind: property
      displayName: name
    expectedUsages:
      - location:
          uri: benchmark://source/src/components.tsx
          range:
            start: { line: 7, character: 14 }
            end: { line: 7, character: 18 }
        kind: property
        displayName: name
      - location:
          uri: benchmark://source/src/app.tsx
          range:
            start: { line: 2, character: 21 }
            end: { line: 2, character: 25 }
        kind: property
        displayName: name
    usageLookups:
      - usage:
          location:
            uri: benchmark://source/src/components.tsx
            range:
              start: { line: 7, character: 14 }
              end: { line: 7, character: 18 }
          kind: property
          displayName: name
        expectedDeclaration:
          location:
            uri: benchmark://source/src/components.tsx
            range:
              start: { line: 3, character: 2 }
              end: { line: 3, character: 6 }
          kind: property
          displayName: name
    verification:
      method: manual_inspection
      notes: User.name is declared in the type literal, initialized in app, and read by formatName.
  - id: ts-tsx-component-reference
    expectedFailure:
      reason: Bifrost baseline misses one or more expected declaration-to-usage sites.
    declaration:
      location:
        uri: benchmark://source/src/components.tsx
        range:
          start: { line: 22, character: 16 }
          end: { line: 22, character: 27 }
      kind: function
      displayName: WelcomeCard
    expectedUsages:
      - location:
          uri: benchmark://source/src/app.tsx
          range:
            start: { line: 0, character: 33 }
            end: { line: 0, character: 44 }
        kind: function
        displayName: WelcomeCard
      - location:
          uri: benchmark://source/src/app.tsx
          range:
            start: { line: 8, character: 10 }
            end: { line: 8, character: 21 }
        kind: function
        displayName: WelcomeCard
    usageLookups:
      - usage:
          location:
            uri: benchmark://source/src/app.tsx
            range:
              start: { line: 8, character: 10 }
              end: { line: 8, character: 21 }
          kind: function
          displayName: WelcomeCard
        expectedDeclaration:
          location:
            uri: benchmark://source/src/components.tsx
            range:
              start: { line: 22, character: 16 }
              end: { line: 22, character: 27 }
          kind: function
          displayName: WelcomeCard
    verification:
      method: manual_inspection
      notes: WelcomeCard is a named exported function imported by app and used as a JSX element.
