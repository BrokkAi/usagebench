schemaVersion: 2
corpus:
  partition: development
  selection: analyzer_informed
groundTruth:
  status: legacy_unattributed
  reviewers: []
referencePolicy: bindings_optional
positionEncoding: utf-16
source:
  kind: fixture
  path: fixtures/typescript/baseline
language: typescript
cases:
  - id: ts-named-export-import-function
    declaration:
      location:
        uri: benchmark://source/src/components.tsx
        range:
          start: { line: 6, character: 16 }
          end: { line: 6, character: 26 }
      kind: function
      displayName: formatName
    expectedUsages:
      - location:
          uri: benchmark://source/src/components.tsx
          range:
            start: { line: 18, character: 29 }
            end: { line: 18, character: 39 }
        kind: function
        displayName: formatName
      - location:
          uri: benchmark://source/src/app.tsx
          range:
            start: { line: 6, character: 14 }
            end: { line: 6, character: 24 }
        kind: function
        displayName: formatName
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/app.tsx
            range:
              start: { line: 6, character: 14 }
              end: { line: 6, character: 24 }
          kind: function
          displayName: formatName
        expectedDeclaration:
          location:
            uri: benchmark://source/src/components.tsx
            range:
              start: { line: 6, character: 16 }
              end: { line: 6, character: 26 }
          kind: function
          displayName: formatName
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-23. formatName is an authored
        function with required concrete calls inside Greeter#greet and in
        app.tsx. The app import-clause token is optional binding metadata under
        bindings_optional, while inline export modifies the declaration rather
        than creating a separate re-export usage. Definition navigation from
        either call must target the authored function body. TypeScript Language
        Server 5.3.0 and Bifrost 0.8.9 both return the exact two calls and
        definition target.
  - id: ts-default-class-import-and-construction
    declaration:
      location:
        uri: benchmark://source/src/components.tsx
        range:
          start: { line: 10, character: 21 }
          end: { line: 10, character: 28 }
      kind: class
      displayName: Greeter
    expectedUsages:
      - location:
          uri: benchmark://source/src/components.tsx
          range:
            start: { line: 23, character: 22 }
            end: { line: 23, character: 29 }
        kind: constructor
        displayName: Greeter
      - location:
          uri: benchmark://source/src/app.tsx
          range:
            start: { line: 4, character: 20 }
            end: { line: 4, character: 27 }
        kind: constructor
        displayName: Greeter
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/app.tsx
            range:
              start: { line: 4, character: 20 }
              end: { line: 4, character: 27 }
          kind: constructor
          displayName: Greeter
        allowedExtraTargets:
          - location:
              uri: benchmark://source/src/components.tsx
              range:
                start: { line: 13, character: 2 }
                end: { line: 13, character: 13 }
            kind: constructor
            displayName: constructor
        expectedDeclaration:
          location:
            uri: benchmark://source/src/components.tsx
            range:
              start: { line: 10, character: 21 }
              end: { line: 10, character: 28 }
          kind: class
          displayName: Greeter
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-23. Greeter is constructed
        locally and through its default import, so both new-expression class
        tokens are required constructor-call usages. The import-clause token is
        optional binding metadata. Definition navigation from the visible
        Greeter token canonically targets the class declaration; the explicit
        constructor member is an allowed additional control-flow target but
        cannot replace the class target. Bifrost 0.8.9 returns the exact
        construction family and canonical class target. TypeScript Language
        Server 5.3.0 returns the exact constructions plus optional import
        binding, then returns both navigation targets; its constructor result
        covers the whole constructor body rather than the authored token, so
        the semantic result is position-unverified rather than exact.
  - id: ts-class-method-call
    declaration:
      location:
        uri: benchmark://source/src/components.tsx
        range:
          start: { line: 17, character: 2 }
          end: { line: 17, character: 7 }
      kind: method
      displayName: greet
    expectedUsages:
      - location:
          uri: benchmark://source/src/components.tsx
          range:
            start: { line: 24, character: 27 }
            end: { line: 24, character: 32 }
        kind: method
        displayName: greet
      - location:
          uri: benchmark://source/src/app.tsx
          range:
            start: { line: 5, character: 24 }
            end: { line: 5, character: 29 }
        kind: method
        displayName: greet
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/app.tsx
            range:
              start: { line: 5, character: 24 }
              end: { line: 5, character: 29 }
          kind: method
          displayName: greet
        expectedDeclaration:
          location:
            uri: benchmark://source/src/components.tsx
            range:
              start: { line: 17, character: 2 }
              end: { line: 17, character: 7 }
          kind: method
          displayName: greet
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-23. Both greet calls use
        immutable locals initialized directly with new Greeter. The fixture has
        no subclass, override, reassignment, or competing greet member, so both
        calls are exact required usages. Definition navigation must target the
        authored Greeter#greet method body. TypeScript Language Server 5.3.0
        and Bifrost 0.8.9 both return the exact two calls and definition target.
  - id: ts-object-property-access
    declaration:
      location:
        uri: benchmark://source/src/components.tsx
        range:
          start: { line: 3, character: 2 }
          end: { line: 3, character: 6 }
      kind: property
      displayName: name
    expectedUsages:
      - location:
          uri: benchmark://source/src/components.tsx
          range:
            start: { line: 7, character: 14 }
            end: { line: 7, character: 18 }
        kind: property
        displayName: name
      - location:
          uri: benchmark://source/src/app.tsx
          range:
            start: { line: 3, character: 21 }
            end: { line: 3, character: 25 }
        kind: property
        displayName: name
    usageLookups:
      - operation: declaration
        usage:
          location:
            uri: benchmark://source/src/components.tsx
            range:
              start: { line: 7, character: 14 }
              end: { line: 7, character: 18 }
          kind: property
          displayName: name
        expectedDeclaration:
          location:
            uri: benchmark://source/src/components.tsx
            range:
              start: { line: 3, character: 2 }
              end: { line: 3, character: 6 }
          kind: property
          displayName: name
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-23. Both the user.name read
        and the object-literal name key are exact required property usages. The
        explicit User annotation contextually types the object literal, so its
        name key is not an unrelated property that merely shares the spelling.
        Declaration navigation must target the name property signature in the
        User type literal; there is no executable property definition. Bifrost
        0.8.9 passes the declaration lookup exactly. TypeScript Language Server
        5.3.0 does not advertise textDocument/declaration, so that request is
        unsupported; its ordinary definition request nevertheless targets the
        exact same property signature.
  - id: ts-tsx-component-reference
    declaration:
      location:
        uri: benchmark://source/src/components.tsx
        range:
          start: { line: 22, character: 16 }
          end: { line: 22, character: 27 }
      kind: function
      displayName: WelcomeCard
    expectedUsages:
      - location:
          uri: benchmark://source/src/app.tsx
          range:
            start: { line: 9, character: 10 }
            end: { line: 9, character: 21 }
        kind: function
        displayName: WelcomeCard
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/app.tsx
            range:
              start: { line: 9, character: 10 }
              end: { line: 9, character: 21 }
          kind: function
          displayName: WelcomeCard
        expectedDeclaration:
          location:
            uri: benchmark://source/src/components.tsx
            range:
              start: { line: 22, character: 16 }
              end: { line: 22, character: 27 }
          kind: function
          displayName: WelcomeCard
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-23. The self-closing
        WelcomeCard JSX tag is one exact required use of the authored function
        component. The app import-clause token is optional binding metadata.
        Definition navigation from the tag must target the WelcomeCard function
        body; there is no separate closing-tag occurrence. TypeScript Language
        Server 5.3.0 and Bifrost 0.8.9 both return the exact JSX usage and
        definition target.
  - id: ts-ky-style-implementation-static-create
    declaration:
      location:
        uri: benchmark://source/src/http.ts
        range:
          start: { line: 10, character: 13 }
          end: { line: 10, character: 15 }
      kind: class
      displayName: Ky
    expectedUsages:
      - location:
          uri: benchmark://source/src/http.ts
          range:
            start: { line: 17, character: 31 }
            end: { line: 17, character: 33 }
        kind: class
        displayName: Ky
      - location:
          uri: benchmark://source/src/http.ts
          range:
            start: { line: 19, character: 28 }
            end: { line: 19, character: 30 }
        kind: class
        displayName: Ky
      - location:
          uri: benchmark://source/src/app.tsx
          range:
            start: { line: 14, character: 23 }
            end: { line: 14, character: 25 }
        kind: class
        displayName: Ky
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/app.tsx
            range:
              start: { line: 14, character: 23 }
              end: { line: 14, character: 25 }
          kind: class
          displayName: Ky
        expectedDeclaration:
          location:
            uri: benchmark://source/src/http.ts
            range:
              start: { line: 10, character: 13 }
              end: { line: 10, character: 15 }
          kind: class
          displayName: Ky
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-23. This case is anchored on
        the Ky class symbol, so all three Ky qualifiers of static create calls
        are exact required class usages. The named import token is optional
        binding metadata, while the create member tokens belong to a separate
        static-method symbol family. Definition navigation from the app
        qualifier must target the authored Ky class body. TypeScript Language
        Server 5.3.0 and Bifrost 0.8.9 both return the exact three class usages
        and definition target.
