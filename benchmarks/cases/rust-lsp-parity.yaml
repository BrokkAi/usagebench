schemaVersion: 2
corpus:
  partition: development
  selection: analyzer_informed
groundTruth:
  status: legacy_unattributed
  reviewers: []
referencePolicy: bindings_optional
positionEncoding: utf-16
source:
  kind: fixture
  path: fixtures/rust/lsp-parity
language: rust
cases:
  - id: rust-parity-module-declaration-definition
    usageLookups:
      - operation: declaration
        usage:
          location:
            uri: benchmark://source/src/lib.rs
            range:
              start: { line: 2, character: 4 }
              end: { line: 2, character: 12 }
          kind: module
          displayName: workflow
        expectedDeclaration:
          location:
            uri: benchmark://source/src/lib.rs
            range:
              start: { line: 0, character: 8 }
              end: { line: 0, character: 16 }
          kind: module
          displayName: workflow
    verification:
      method: analyzer_comparison
      notes: >
        Parity source: rust-lang/rust-analyzer@cc5f0f8dadfc3297aebe4026d99b6d8f85fb1eb8.
        Upstream test: crates/ide/src/goto_definition.rs::goto_def_for_module_declaration.
        Adapted fixture: fixtures/rust/lsp-parity/.
        Maturity: adapted to the concrete source-location contract by resolving the workflow use path back to the mod workflow declaration token.
  - id: rust-parity-ufcs-trait-method-definition
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/lib.rs
            range:
              start: { line: 19, character: 17 }
              end: { line: 19, character: 20 }
          kind: method
          displayName: run
        expectedDeclaration:
          location:
            uri: benchmark://source/src/lib.rs
            range:
              start: { line: 7, character: 7 }
              end: { line: 7, character: 10 }
          kind: method
          displayName: run
    verification:
      method: analyzer_comparison
      notes: >
        Parity source: rust-lang/rust-analyzer@cc5f0f8dadfc3297aebe4026d99b6d8f85fb1eb8.
        Upstream test: crates/ide/src/goto_definition.rs::goto_def_for_ufcs_trait_methods_through_self.
        Adapted fixture: fixtures/rust/lsp-parity/.
        Maturity: LocalRunner::run is provided by the Runner trait default method, so definition lookup should reach Runner::run.
  - id: rust-parity-associated-type-definition-no-movement
    usageLookups:
      - operation: definition
        expectNoMovement: true
        usage:
          location:
            uri: benchmark://source/src/lib.rs
            range:
              start: { line: 15, character: 9 }
              end: { line: 15, character: 15 }
          kind: type
          displayName: Output
        expectedDeclaration:
          location:
            uri: benchmark://source/src/lib.rs
            range:
              start: { line: 15, character: 9 }
              end: { line: 15, character: 15 }
          kind: type
          displayName: Output
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-17. The cursor is already on
        the concrete associated-type definition, so ordinary definition
        navigation may return no result or the exact same token but must not
        jump to the trait declaration. The rejected expectation was adapted
        from rust-lang/rust-analyzer's goto_def_of_trait_impl_type_alias test at
        cc5f0f8dadfc3297aebe4026d99b6d8f85fb1eb8.
  - id: rust-parity-associated-type-use-definition
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/lib.rs
            range:
              start: { line: 22, character: 62 }
              end: { line: 22, character: 68 }
          kind: type
          displayName: Output
        expectedDeclaration:
          location:
            uri: benchmark://source/src/lib.rs
            range:
              start: { line: 15, character: 9 }
              end: { line: 15, character: 15 }
          kind: type
          displayName: Output
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-17. The fully qualified use
        <LocalRunner as Runner>::Output statically selects LocalRunner's Runner
        implementation, whose concrete associated-type definition is
        type Output = String.
  - id: rust-parity-direct-function-reference
    declaration:
      location:
        uri: benchmark://source/src/lib.rs
        range:
          start: { line: 40, character: 7 }
          end: { line: 40, character: 17 }
      kind: function
      displayName: direct_job
    expectedUsages:
      - location:
          uri: benchmark://source/src/lib.rs
          range:
            start: { line: 45, character: 4 }
            end: { line: 45, character: 14 }
        kind: function
        displayName: direct_job
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/lib.rs
            range:
              start: { line: 45, character: 4 }
              end: { line: 45, character: 14 }
          kind: function
          displayName: direct_job
        expectedDeclaration:
          location:
            uri: benchmark://source/src/lib.rs
            range:
              start: { line: 40, character: 7 }
              end: { line: 40, character: 17 }
          kind: function
          displayName: direct_job
    verification:
      method: manual_inspection
      notes: >
        Reviewed as correct by DavidBakerEffendi on 2026-07-17. The function
        name in pub fn direct_job is the definition, the call is its usage, and
        the queried definition token is not itself an expected usage. Direct
        control for the generated-function pair, manually checked against
        fixtures/rust/lsp-parity/src/lib.rs.
        Parity source: rust-lang/rust-analyzer@cc5f0f8dadfc3297aebe4026d99b6d8f85fb1eb8.
        Upstream reference: crates/ide/src/references.rs function-reference tests.
        Server profile: rust-analyzer 2026-07-13; measured as 0.3.2971-standalone (ffcdbbd906 2026-07-13).
  - id: rust-parity-macro-generated-function-reference
    expectedFailure:
      reason: Bifrost does not expand define_job_maker!, so it cannot index the generated function declaration at the macro invocation.
    declaration:
      location:
        uri: benchmark://source/src/lib.rs
        range:
          start: { line: 34, character: 18 }
          end: { line: 34, character: 31 }
      kind: function
      displayName: generated_job
    expectedUsages:
      - location:
          uri: benchmark://source/src/lib.rs
          range:
            start: { line: 37, character: 4 }
            end: { line: 37, character: 17 }
        kind: function
        displayName: generated_job
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/lib.rs
            range:
              start: { line: 37, character: 4 }
              end: { line: 37, character: 17 }
          kind: function
          displayName: generated_job
        expectedDeclaration:
          location:
            uri: benchmark://source/src/lib.rs
            range:
              start: { line: 34, character: 18 }
              end: { line: 34, character: 31 }
          kind: function
          displayName: generated_job
    verification:
      method: manual_inspection
      notes: >
        Reviewed as correct by DavidBakerEffendi on 2026-07-17. The macro
        invocation identifier is the file-backed definition anchor for the
        generated function; the later call is its usage and the invocation
        anchor is not itself counted as a usage. Expected ranges were manually
        checked against fixtures/rust/lsp-parity/src/lib.rs.
        Parity source: rust-lang/rust-analyzer@cc5f0f8dadfc3297aebe4026d99b6d8f85fb1eb8.
        Upstream reference: crates/ide/src/goto_definition.rs macro-definition tests and crates/ide/src/references.rs::test_find_all_refs_macro_def.
        Server profile: rust-analyzer 2026-07-13; measured as 0.3.2971-standalone (ffcdbbd906 2026-07-13).
        Maturity: generated_job is declared through define_job_maker! and called from source; both anchors are file-backed and standard references/definition operations can score them.
