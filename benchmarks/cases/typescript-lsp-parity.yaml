schemaVersion: 2
corpus:
  partition: development
  selection: analyzer_informed
groundTruth:
  status: legacy_unattributed
  reviewers: []
referencePolicy: bindings_optional
positionEncoding: utf-16
source:
  kind: fixture
  path: fixtures/typescript/lsp-parity
language: typescript
cases:
  - id: ts-parity-default-function-import-call
    declaration:
      location:
        uri: benchmark://source/src/api.ts
        range:
          start: { line: 21, character: 24 }
          end: { line: 21, character: 36 }
      kind: function
      displayName: createClient
    expectedUsages:
      - location:
          uri: benchmark://source/src/app.ts
          range:
            start: { line: 2, character: 15 }
            end: { line: 2, character: 27 }
        kind: function
        displayName: createClient
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/app.ts
            range:
              start: { line: 2, character: 15 }
              end: { line: 2, character: 27 }
          kind: function
          displayName: createClient
        expectedDeclaration:
          location:
            uri: benchmark://source/src/api.ts
            range:
              start: { line: 21, character: 24 }
              end: { line: 21, character: 36 }
          kind: function
          displayName: createClient
    verification:
      method: analyzer_comparison
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-23. The app call is the sole
        required executable use of the default-exported createClient function.
        The default-import token is optional binding metadata, while inline
        export default modifies the authored declaration rather than creating a
        separate usage. Definition navigation from the call must target the
        authored function body.
        Parity source: microsoft/TypeScript@637d5746b70257028fb95aad32ddec6b26ab0a14.
        Upstream reference: TypeScript Server fourslash go-to-definition scenarios for default exports and imported call sites.
        Adapted fixture: fixtures/typescript/lsp-parity/.
        Maturity: a default function import call should resolve back to the exported function declaration.
        TypeScript Language Server 5.3.0 and Bifrost 0.8.9 both return the exact
        call and definition target.
  - id: ts-parity-static-method-call
    declaration:
      location:
        uri: benchmark://source/src/api.ts
        range:
          start: { line: 6, character: 9 }
          end: { line: 6, character: 15 }
      kind: method
      displayName: create
    expectedUsages:
      - location:
          uri: benchmark://source/src/api.ts
          range:
            start: { line: 22, character: 19 }
            end: { line: 22, character: 25 }
        kind: method
        displayName: create
      - location:
          uri: benchmark://source/src/app.ts
          range:
            start: { line: 3, character: 25 }
            end: { line: 3, character: 31 }
        kind: method
        displayName: create
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/app.ts
            range:
              start: { line: 3, character: 25 }
              end: { line: 3, character: 31 }
          kind: method
          displayName: create
        expectedDeclaration:
          location:
            uri: benchmark://source/src/api.ts
            range:
              start: { line: 6, character: 9 }
              end: { line: 6, character: 15 }
          kind: method
          displayName: create
    verification:
      method: analyzer_comparison
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-24. Both create member tokens
        are exact required uses of the authored static method. The ApiClient
        qualifiers belong to the class-symbol family, and new ApiClient invokes
        the constructor rather than create. Static dispatch is unambiguous.
        Definition navigation from the app call must target the authored static
        method body.
        Parity source: microsoft/TypeScript@637d5746b70257028fb95aad32ddec6b26ab0a14.
        Upstream reference: TypeScript Server fourslash references for static class members and imported class call sites.
        Adapted fixture: fixtures/typescript/lsp-parity/.
        Maturity: ApiClient.create calls from the defining module and imported module should resolve to the static method declaration.
        TypeScript Language Server 5.3.0 and Bifrost 0.8.9 both return the exact
        two static-method usages and definition target.
  - id: ts-parity-type-only-interface-import
    typeLookups:
      - expression:
          location:
            uri: benchmark://source/src/app.ts
            range:
              start: { line: 4, character: 6 }
              end: { line: 4, character: 10 }
          kind: variable
          displayName: user
        expectedType:
          location:
            uri: benchmark://source/src/api.ts
            range:
              start: { line: 0, character: 17 }
              end: { line: 0, character: 21 }
          kind: interface
          displayName: User
    verification:
      method: analyzer_comparison
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-24. A type lookup on the local
        user variable must recover the authored User interface in api.ts. The
        result is exact because the variable has an explicit User annotation
        and does not depend on inferring fetchUser's return type. The type-only
        import binding is routing metadata rather than the final type target.
        Parity source: microsoft/TypeScript@637d5746b70257028fb95aad32ddec6b26ab0a14.
        Upstream reference: TypeScript Server fourslash type-only import scenarios such as autoImportTypeOnlyPreferred*.ts and codeFixConvertToTypeOnlyImport*.ts.
        Adapted fixture: fixtures/typescript/lsp-parity/.
        Maturity: the local user variable is annotated through a type-only import and should recover the User interface type.
        TypeScript Language Server 5.3.0 and Bifrost 0.8.9 both recover the
        exact authored interface target.
  - id: ts-parity-interface-property-access
    declaration:
      location:
        uri: benchmark://source/src/api.ts
        range:
          start: { line: 2, character: 2 }
          end: { line: 2, character: 6 }
      kind: property
      displayName: name
    expectedUsages:
      - location:
          uri: benchmark://source/src/api.ts
          range:
            start: { line: 13, character: 17 }
            end: { line: 13, character: 21 }
        kind: property
        displayName: name
      - location:
          uri: benchmark://source/src/api.ts
          range:
            start: { line: 18, character: 14 }
            end: { line: 18, character: 18 }
        kind: property
        displayName: name
      - location:
          uri: benchmark://source/src/app.ts
          range:
            start: { line: 6, character: 18 }
            end: { line: 6, character: 22 }
        kind: property
        displayName: name
    usageLookups:
      - operation: declaration
        usage:
          location:
            uri: benchmark://source/src/app.ts
            range:
              start: { line: 6, character: 18 }
              end: { line: 6, character: 22 }
          kind: property
          displayName: name
        expectedDeclaration:
          location:
            uri: benchmark://source/src/api.ts
            range:
              start: { line: 2, character: 2 }
              end: { line: 2, character: 6 }
          kind: property
          displayName: name
    verification:
      method: analyzer_comparison
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-24. The contextually typed
        object-literal name key and both user.name reads are exact required
        usages of the User.name property. The local variable declaration in
        const name is a distinct same-spelled symbol and must be excluded. The
        explicit User return type makes the object-literal property identity
        exact. Declaration navigation from the app member access must target
        the name property signature in User.
        Parity source: microsoft/TypeScript@637d5746b70257028fb95aad32ddec6b26ab0a14.
        Upstream reference: TypeScript Server fourslash find-all-references and object/type literal property scenarios.
        Adapted fixture: fixtures/typescript/lsp-parity/.
        Maturity: User.name should connect object-literal initialization and property reads back to the interface property declaration.
        Bifrost 0.8.9 passes the declaration lookup exactly. TypeScript Language
        Server 5.3.0 does not advertise textDocument/declaration, so that
        request is unsupported; its ordinary definition request reaches the
        exact property signature.
