schemaVersion: 2
corpus:
  partition: development
  selection: analyzer_informed
groundTruth:
  status: legacy_unattributed
  reviewers: []
referencePolicy: bindings_optional
positionEncoding: utf-16
source:
  kind: fixture
  path: fixtures/cpp/baseline
language: cpp
cases:
  - id: cpp-function-call
    declaration:
      location:
        uri: benchmark://source/include/service.h
        range:
          start: { line: 22, character: 8 }
          end: { line: 22, character: 21 }
      kind: function
      displayName: build_service
    expectedUsages:
      - location:
          uri: benchmark://source/src/main.cpp
          range:
            start: { line: 6, character: 19 }
            end: { line: 6, character: 32 }
        kind: function
        displayName: build_service
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/main.cpp
            range:
              start: { line: 6, character: 19 }
              end: { line: 6, character: 32 }
          kind: function
          displayName: build_service
        expectedDeclaration:
          location:
            uri: benchmark://source/src/service.cpp
            range:
              start: { line: 16, character: 8 }
              end: { line: 16, character: 21 }
          kind: function
          displayName: build_service
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-20. The call is the usage of
        build_service. The out-of-line function body is a definition and also
        a C++ declaration, not a usage; it is therefore excluded from the
        reference set. Explicit definition navigation from the call reaches
        the unique body in service.cpp.
  - id: cpp-class-reference
    declaration:
      location:
        uri: benchmark://source/include/service.h
        range:
          start: { line: 11, character: 6 }
          end: { line: 11, character: 13 }
      kind: class
      displayName: Service
    expectedUsages:
      - location:
          uri: benchmark://source/include/service.h
          range:
            start: { line: 22, character: 0 }
            end: { line: 22, character: 7 }
        kind: class
        displayName: Service
      - location:
          uri: benchmark://source/src/service.cpp
          range:
            start: { line: 16, character: 0 }
            end: { line: 16, character: 7 }
        kind: class
        displayName: Service
      - location:
          uri: benchmark://source/src/service.cpp
          range:
            start: { line: 9, character: 0 }
            end: { line: 9, character: 7 }
        kind: class
        displayName: Service
      - location:
          uri: benchmark://source/src/service.cpp
          range:
            start: { line: 11, character: 12 }
            end: { line: 11, character: 19 }
        kind: class
        displayName: Service
      - location:
          uri: benchmark://source/src/service.cpp
          range:
            start: { line: 17, character: 11 }
            end: { line: 17, character: 18 }
        kind: class
        displayName: Service
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/service.cpp
            range:
              start: { line: 16, character: 0 }
              end: { line: 16, character: 7 }
          kind: class
          displayName: Service
        expectedDeclaration:
          location:
            uri: benchmark://source/include/service.h
            range:
              start: { line: 11, character: 6 }
              end: { line: 11, character: 13 }
          kind: class
          displayName: Service
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-21. Service is used as the
        build_service return type in the header and implementation, as the
        explicit qualifier in both out-of-line member definitions, and as the
        type named by the construction expression. Constructor declaration and
        definition tokens are not class usages. Definition navigation from a
        type usage reaches the class body.
  - id: cpp-constructor-call
    declaration:
      location:
        uri: benchmark://source/include/service.h
        range:
          start: { line: 13, character: 13 }
          end: { line: 13, character: 20 }
      kind: constructor
      displayName: Service
    expectedUsages:
      - location:
          uri: benchmark://source/src/service.cpp
          range:
            start: { line: 17, character: 11 }
            end: { line: 17, character: 18 }
        kind: constructor
        displayName: Service
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/service.cpp
            range:
              start: { line: 17, character: 11 }
              end: { line: 17, character: 18 }
          kind: constructor
          displayName: Service
        expectedDeclaration:
          location:
            uri: benchmark://source/include/service.h
            range:
              start: { line: 11, character: 6 }
              end: { line: 11, character: 13 }
          kind: class
          displayName: Service
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-21. The construction
        expression is the constructor usage. The out-of-line constructor body
        is a definition rather than a usage. In C++ functional construction,
        the source token names the Service type even though it causes a
        constructor call, so ordinary definition navigation reaches the class
        body rather than a constructor declaration or body.
  - id: cpp-method-call
    declaration:
      location:
        uri: benchmark://source/include/service.h
        range:
          start: { line: 14, character: 16 }
          end: { line: 14, character: 23 }
      kind: method
      displayName: execute
    expectedUsages:
      - location:
          uri: benchmark://source/src/main.cpp
          range:
            start: { line: 7, character: 26 }
            end: { line: 7, character: 33 }
        kind: method
        displayName: execute
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/main.cpp
            range:
              start: { line: 7, character: 26 }
              end: { line: 7, character: 33 }
          kind: method
          displayName: execute
        expectedDeclaration:
          location:
            uri: benchmark://source/src/service.cpp
            range:
              start: { line: 11, character: 21 }
              end: { line: 11, character: 28 }
          kind: method
          displayName: execute
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-21. The concrete
        service.execute call is the method usage. The out-of-line method body
        is a definition rather than a usage. Definition navigation from the
        call reaches Service::execute in service.cpp; explicit declaration
        navigation would reach the header declaration.
  - id: cpp-field-access
    declaration:
      location:
        uri: benchmark://source/include/service.h
        range:
          start: { line: 7, character: 16 }
          end: { line: 7, character: 20 }
      kind: field
      displayName: last
    expectedUsages:
      - location:
          uri: benchmark://source/src/service.cpp
          range:
            start: { line: 5, character: 4 }
            end: { line: 5, character: 8 }
        kind: field
        displayName: last
      - location:
          uri: benchmark://source/src/service.cpp
          range:
            start: { line: 6, character: 11 }
            end: { line: 6, character: 15 }
        kind: field
        displayName: last
      - location:
          uri: benchmark://source/src/main.cpp
          range:
            start: { line: 8, character: 60 }
            end: { line: 8, character: 64 }
        kind: field
        displayName: last
    usageLookups:
      - operation: declaration
        usage:
          location:
            uri: benchmark://source/src/main.cpp
            range:
              start: { line: 8, character: 60 }
              end: { line: 8, character: 64 }
          kind: field
          displayName: last
        expectedDeclaration:
          location:
            uri: benchmark://source/include/service.h
            range:
              start: { line: 7, character: 16 }
              end: { line: 7, character: 20 }
          kind: field
          displayName: last
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-21. Repository::last is
        written and read through the implicit this receiver in save, and read
        through the concrete Repository receiver in run_demo. All three are
        field usages. Declaration navigation reaches the field token in the
        class body.
  - id: cpp-constant-access
    declaration:
      location:
        uri: benchmark://source/include/service.h
        range:
          start: { line: 20, character: 29 }
          end: { line: 20, character: 42 }
      kind: constant
      displayName: DefaultPrefix
    expectedUsages:
      - location:
          uri: benchmark://source/src/service.cpp
          range:
            start: { line: 13, character: 23 }
            end: { line: 13, character: 36 }
        kind: constant
        displayName: DefaultPrefix
      - location:
          uri: benchmark://source/src/main.cpp
          range:
            start: { line: 8, character: 23 }
            end: { line: 8, character: 36 }
        kind: constant
        displayName: DefaultPrefix
    usageLookups:
      - operation: declaration
        usage:
          location:
            uri: benchmark://source/src/main.cpp
            range:
              start: { line: 8, character: 23 }
              end: { line: 8, character: 36 }
          kind: constant
          displayName: DefaultPrefix
        expectedDeclaration:
          location:
            uri: benchmark://source/include/service.h
            range:
              start: { line: 20, character: 29 }
              end: { line: 20, character: 42 }
          kind: constant
          displayName: DefaultPrefix
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-21. DefaultPrefix is an inline
        constexpr binding declared and defined at one header token, then read
        from service.cpp and main.cpp. Both reads are usages. Declaration
        navigation reaches the header binding without relying on fallback to
        definition navigation.
