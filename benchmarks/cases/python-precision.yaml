        usage:
          location: { uri: benchmark://source/consumer.py, range: { start: { line: 8, character: 15 }, end: { line: 8, character: 19 } } }
          kind: method
          displayName: save
        expectedDeclaration:
          location: { uri: benchmark://source/precision/services.py, range: { start: { line: 10, character: 8 }, end: { line: 10, character: 12 } } }
          kind: method
          displayName: save
    verification:
      method: manual_inspection
      notes: >
        Grandchild is re-exported through the package barrel but overrides the
        inherited save method. Its concretely typed call must resolve to the
        Grandchild.save definition rather than Base.save.
        Pyright 1.1.411 returned only grandchild.save() as a Grandchild.save
        reference and navigated that call exactly to the override definition.
