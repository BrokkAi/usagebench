source: { kind: fixture, path: fixtures/python/precision }
language: python
cases:
  - id: python-barrel-inherited-member-call
    declaration:
      location: { uri: benchmark://source/precision/services.py, range: { start: { line: 1, character: 8 }, end: { line: 1, character: 12 } } }
      kind: method
      displayName: save
    expectedUsages:
      - location: { uri: benchmark://source/consumer.py, range: { start: { line: 6, character: 11 }, end: { line: 6, character: 15 } } }
        kind: method
        displayName: save
    usageLookups:
      - operation: definition
        usage:
          location: { uri: benchmark://source/consumer.py, range: { start: { line: 6, character: 11 }, end: { line: 6, character: 15 } } }
          kind: method
          displayName: save
        expectedDeclaration:
          location: { uri: benchmark://source/precision/services.py, range: { start: { line: 1, character: 8 }, end: { line: 1, character: 12 } } }
          kind: method
          displayName: save
    verification:
      method: manual_inspection
      notes: >
        Child is re-exported from the package barrel and inherits Base.save
        without overriding it. The separately re-exported Grandchild does
        override save, so its call is intentionally excluded from Base.save
        and covered by python-barrel-overridden-member-call.
        Pyright 1.1.411 returned only client.save() as a Base.save reference
        and navigated that call exactly to the Base.save definition.
  - id: python-barrel-overridden-member-call
    declaration:
      location: { uri: benchmark://source/precision/services.py, range: { start: { line: 10, character: 8 }, end: { line: 10, character: 12 } } }
      kind: method
      displayName: save
    expectedUsages:
