schemaVersion: 2
corpus:
  partition: development
  selection: analyzer_informed
groundTruth:
  status: legacy_unattributed
  reviewers: []
referencePolicy: bindings_optional
positionEncoding: utf-16
source:
  kind: fixture
  path: fixtures/go/baseline
language: go
cases:
  - id: go-package-function-call
    declaration:
      location:
        uri: benchmark://source/src/example/service.go
        range:
          start: { line: 23, character: 5 }
          end: { line: 23, character: 15 }
      kind: function
      displayName: NewService
    expectedUsages:
      - location:
          uri: benchmark://source/src/example/service_test.go
          range:
            start: { line: 4, character: 15 }
            end: { line: 4, character: 25 }
        kind: function
        displayName: NewService
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/example/service_test.go
            range:
              start: { line: 4, character: 15 }
              end: { line: 4, character: 25 }
          kind: function
          displayName: NewService
        expectedDeclaration:
          location:
            uri: benchmark://source/src/example/service.go
            range:
              start: { line: 23, character: 5 }
              end: { line: 23, character: 15 }
          kind: function
          displayName: NewService
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-22. The NewService call in
        ExampleService is the sole usage of the package-level function;
        Service in the returned composite literal is a separate type usage.
        Definition navigation from the call reaches the NewService function
        body. gopls 0.23.0 returned exactly that usage and definition target.
  - id: go-value-receiver-method-call
    declaration:
      location:
        uri: benchmark://source/src/example/service.go
        range:
          start: { line: 27, character: 17 }
          end: { line: 27, character: 24 }
      kind: method
      displayName: Execute
    expectedUsages:
      - location:
          uri: benchmark://source/src/example/service_test.go
          range:
            start: { line: 5, character: 22 }
            end: { line: 5, character: 29 }
        kind: method
        displayName: Execute
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/example/service_test.go
            range:
              start: { line: 5, character: 22 }
              end: { line: 5, character: 29 }
          kind: method
          displayName: Execute
        expectedDeclaration:
          location:
            uri: benchmark://source/src/example/service.go
            range:
              start: { line: 27, character: 17 }
              end: { line: 27, character: 24 }
          kind: method
          displayName: Execute
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-22. Execute is defined on the
        Service value receiver and has one exact call through a Service value
        in ExampleService. Definition navigation from the call reaches the
        Execute method body. gopls 0.23.0 returned exactly that usage and
        definition target.
  - id: go-pointer-receiver-method-call
    declaration:
      location:
        uri: benchmark://source/src/example/service.go
        range:
          start: { line: 14, character: 27 }
          end: { line: 14, character: 31 }
      kind: method
      displayName: Save
    expectedUnprovenUsages:
      - location:
          uri: benchmark://source/src/example/service.go
          range:
            start: { line: 28, character: 27 }
            end: { line: 28, character: 31 }
        kind: method
        displayName: Save
    expectedUsages:
      - location:
          uri: benchmark://source/src/example/service_test.go
          range:
            start: { line: 8, character: 15 }
            end: { line: 8, character: 19 }
        kind: method
        displayName: Save
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/example/service_test.go
            range:
              start: { line: 8, character: 15 }
              end: { line: 8, character: 19 }
          kind: method
          displayName: Save
        expectedDeclaration:
          location:
            uri: benchmark://source/src/example/service.go
            range:
              start: { line: 14, character: 27 }
              end: { line: 14, character: 31 }
          kind: method
          displayName: Save
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-22. The call through the
        *MemoryRepository local is the required concrete usage. The call
        through the Repository-typed field retains its separate static
        interface identity but is an unproven concrete runtime candidate.
        Definition navigation from the direct call reaches the pointer-receiver
        method body. gopls 0.23.0 expands references symmetrically across the
        interface family while preserving those distinct navigation targets.
  - id: go-struct-field-access
    declaration:
      location:
        uri: benchmark://source/src/example/service.go
        range:
          start: { line: 11, character: 4 }
          end: { line: 11, character: 8 }
      kind: field
      displayName: Last
    expectedUsages:
      - location:
          uri: benchmark://source/src/example/service.go
          range:
            start: { line: 15, character: 6 }
            end: { line: 15, character: 10 }
        kind: field
        displayName: Last
      - location:
          uri: benchmark://source/src/example/service_test.go
          range:
            start: { line: 9, character: 19 }
            end: { line: 9, character: 23 }
        kind: field
        displayName: Last
    usageLookups:
      - operation: declaration
        usage:
          location:
            uri: benchmark://source/src/example/service_test.go
            range:
              start: { line: 9, character: 19 }
              end: { line: 9, character: 23 }
          kind: field
          displayName: Last
        expectedDeclaration:
          location:
            uri: benchmark://source/src/example/service.go
            range:
              start: { line: 11, character: 4 }
              end: { line: 11, character: 8 }
          kind: field
          displayName: Last
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-22. Last has one write through
        the method receiver and one read through an exact *MemoryRepository
        local. Declaration navigation targets the field declaration in the
        struct; there is no separate executable definition body. gopls 0.23.0
        returned exactly both field usages but does not advertise the separate
        textDocument/declaration operation.
  - id: go-package-constant-access
    declaration:
      location:
        uri: benchmark://source/src/example/service.go
        range:
          start: { line: 6, character: 6 }
          end: { line: 6, character: 19 }
      kind: constant
      displayName: DefaultPrefix
    expectedUsages:
      - location:
          uri: benchmark://source/src/example/service.go
          range:
            start: { line: 29, character: 11 }
            end: { line: 29, character: 24 }
        kind: constant
        displayName: DefaultPrefix
      - location:
          uri: benchmark://source/src/example/service_test.go
          range:
            start: { line: 7, character: 8 }
            end: { line: 7, character: 21 }
        kind: constant
        displayName: DefaultPrefix
    usageLookups:
      - operation: declaration
        usage:
          location:
            uri: benchmark://source/src/example/service_test.go
            range:
              start: { line: 7, character: 8 }
              end: { line: 7, character: 21 }
          kind: constant
          displayName: DefaultPrefix
        expectedDeclaration:
          location:
            uri: benchmark://source/src/example/service.go
            range:
              start: { line: 6, character: 6 }
              end: { line: 6, character: 19 }
          kind: constant
          displayName: DefaultPrefix
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-22. DefaultPrefix is read once
        in Execute and once in ExampleService. Declaration navigation targets
        the initialized package constant binding; there is no separate
        executable definition body. gopls 0.23.0 returned exactly both usages
        but does not advertise textDocument/declaration.
  - id: go-package-variable-access
    declaration:
      location:
        uri: benchmark://source/src/example/service.go
        range:
          start: { line: 8, character: 4 }
          end: { line: 8, character: 21 }
      kind: variable
      displayName: DefaultRepository
    expectedUsages:
      - location:
          uri: benchmark://source/src/example/service_test.go
          range:
            start: { line: 6, character: 8 }
            end: { line: 6, character: 25 }
        kind: variable
        displayName: DefaultRepository
    usageLookups:
      - operation: declaration
        usage:
          location:
            uri: benchmark://source/src/example/service_test.go
            range:
              start: { line: 6, character: 8 }
              end: { line: 6, character: 25 }
          kind: variable
          displayName: DefaultRepository
        expectedDeclaration:
          location:
            uri: benchmark://source/src/example/service.go
            range:
              start: { line: 8, character: 4 }
              end: { line: 8, character: 21 }
          kind: variable
          displayName: DefaultRepository
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-22. DefaultRepository has one
        package-variable read in ExampleService. Declaration navigation targets
        the initialized package variable binding. MemoryRepository in the
        initializer is a separate type/construction usage; the address-of form
        is required because only *MemoryRepository implements Repository.
        gopls 0.23.0 returned exactly the package-variable read but does not
        advertise textDocument/declaration.
