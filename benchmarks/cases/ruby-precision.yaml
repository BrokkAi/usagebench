        usage:
          location: { uri: benchmark://source/lib/precision/factory.rb, range: { start: { line: 4, character: 4 }, end: { line: 4, character: 8 } } }
          kind: class
          displayName: Base
        expectedDeclaration:
          location: { uri: benchmark://source/lib/precision/base.rb, range: { start: { line: 1, character: 8 }, end: { line: 1, character: 12 } } }
          kind: class
          displayName: Base
      - operation: definition
        usage:
          location: { uri: benchmark://source/app/run.rb, range: { start: { line: 5, character: 20 }, end: { line: 5, character: 24 } } }
          kind: class
          displayName: Base
        expectedDeclaration:
          location: { uri: benchmark://source/lib/precision/base.rb, range: { start: { line: 1, character: 8 }, end: { line: 1, character: 12 } } }
          kind: class
          displayName: Base
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-23. Base in Precision.build
        resolves lexically to Precision::Base, while Base in
        Precision::Base.build names the same class explicitly. Both are
        required class usages and Definition navigation from either must target
        class Base. The lowercase require_relative path is optional binding
        metadata; new and build are separate method identities. Ruby LSP
        0.26.10 and Solargraph 0.60.2 both include the queried class
        declaration, so declaration inclusion is an explicit allowed extra.
        Solargraph returns both exact usages and navigates both to the enclosing
        Precision::Base class body. In an isolated cold run, Ruby LSP returned
        only the lexical usage, sent its Definition to the unrelated
        standard-library Random::Base RBS entry, and returned no Definition
        from Precision::Base. In the complete Ruby run, after the preceding
        factory-return case indexed the same fixture, Ruby LSP returned both
        usages and both correct definitions, with only a broad qualified
        reference range. The scored qualified-use referenceProbe and five-second
        profile settle make that complete result reproducible. The cold result
        is initialization/order-sensitive analysis, not a stable semantic
        disagreement.
