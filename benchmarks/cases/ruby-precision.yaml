    usageLookups:
      - operation: definition
        usage:
          location: { uri: benchmark://source/app/run.rb, range: { start: { line: 3, character: 8 }, end: { line: 3, character: 15 } } }
          kind: method
          displayName: execute
        expectedDeclaration:
          location: { uri: benchmark://source/lib/precision/base.rb, range: { start: { line: 2, character: 8 }, end: { line: 2, character: 15 } } }
          kind: method
          displayName: execute
      - operation: definition
        usage:
          location: { uri: benchmark://source/app/run.rb, range: { start: { line: 6, character: 7 }, end: { line: 6, character: 14 } } }
          kind: method
          displayName: execute
        expectedDeclaration:
          location: { uri: benchmark://source/lib/precision/base.rb, range: { start: { line: 2, character: 8 }, end: { line: 2, character: 15 } } }
          kind: method
          displayName: execute
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-23. Precision.build explicitly
        returns Base.new. Precision::Base.build executes with self equal to
        Base, so its bare new also returns a Base. Both locals are assigned once
        without competing writes, making both execute calls exact usages of
        Base#execute under flow-sensitive static analysis. Definition
        navigation from either call must target the authored Base#execute body.
        General Ruby mutability and monkey-patching introduce no observed
        alternate target in this closed fixture. Ruby LSP 0.26.10 and
        Solargraph 0.60.2 both return the two exact calls plus the queried
        method declaration, so declaration inclusion is an explicit allowed
        extra. Solargraph navigates both calls to an enclosing Base#execute
        range. With settled full-fixture indexing, Ruby LSP includes the correct
        Base#execute target but also returns numerous unrelated RubyGems
        execute methods. That remains genuine method-family navigation noise,
        not conservative ambiguity in this closed fixture.
