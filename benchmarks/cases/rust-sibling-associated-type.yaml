  reviewers: []
referencePolicy: bindings_optional
positionEncoding: utf-16
source:
  kind: fixture
  path: fixtures/rust/sibling-associated-type
language: rust
cases:
  - id: rust-sibling-module-type-segment-definition
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/main.rs
            range:
              start: { line: 5, character: 12 }
              end: { line: 5, character: 20 }
          kind: type
          displayName: AppState
        expectedDeclaration:
          location:
            uri: benchmark://source/src/state.rs
            range:
              start: { line: 0, character: 11 }
              end: { line: 0, character: 19 }
          kind: type
          displayName: AppState
    verification:
      method: manual_inspection
      notes: >
        Reviewed as correct by DavidBakerEffendi on 2026-07-17. AppState is
        imported from the sibling state module and used as the type qualifier
        of AppState::with_environment. Definition lookup reaches the unit struct
        definition, not the impl block or associated function. The former case
        ID incorrectly called this an associated-type segment.
