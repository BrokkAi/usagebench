              end: { line: 31, character: 24 }
          kind: class
          displayName: RenderRequest
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-23. RenderRequest("Hello
        World") invokes the generated case-class companion apply and is a
        required construction usage of the originating case class. The
        generated copy method has no authored definition token, so Definition
        navigation from copy must use the case-class declaration as its source
        provenance, matching the generated-member policy used for JavaScript
        and TypeScript source constructs.
        Parity source: scalameta/metals@0e01c3f6e56736e88f6bb276156b8049cbf3ca9d.
        Upstream reference: Metals semanticdb-backed tests involving generated and synthetic symbols.
        Adapted fixture: fixtures/scala/lsp-parity/.
        Maturity: case-class apply and copy surfaces are planned and scoreable
        through their authored case-class provenance. Metals 1.6.7 returns the
        exact construction reference and navigates both construction and copy
        to the case-class declaration. Bifrost 0.8.9 returns the exact
        construction edge and navigation but cannot resolve the generated copy
        receiver, leaving a focused synthesized-member navigation miss.
