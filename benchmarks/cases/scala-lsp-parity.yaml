          location:
            uri: benchmark://source/src/main/scala/example/Workflow.scala
            range:
              start: { line: 15, character: 13 }
              end: { line: 15, character: 19 }
          kind: method
          displayName: render
        expectedDeclaration:
          location:
            uri: benchmark://source/src/main/scala/example/Workflow.scala
            range:
              start: { line: 3, character: 6 }
              end: { line: 3, character: 12 }
          kind: method
          displayName: render
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-23. Renderer#render's exact
        source family includes the overriding declaration and the call through
        Workflow's Renderer-typed parameter. The final renderer val has the
        concrete inferred type ConsoleRenderer, so its direct call belongs to
        the override family scored separately rather than to this trait family.
        Definition navigation from the interface-typed call must target the
        abstract Renderer#render declaration.
        Parity source: scalameta/metals@0e01c3f6e56736e88f6bb276156b8049cbf3ca9d.
        Upstream reference: Metals definition/reference and implementation suites for trait methods and overrides.
        Adapted fixture: fixtures/scala/lsp-parity/.
        Maturity: trait method references should connect the abstract method,
        overriding declaration, and interface-typed call without absorbing a
        statically concrete override call. Metals 1.6.7 returns the exact
        interface-typed call and navigation target but omits the overriding
        declaration from ordinary References; in the complete parity run it
        also returns the separately scored concrete call as an extra. Bifrost
        0.8.9 includes the override and navigates exactly, but likewise returns
        the concrete call as trait-family noise.
