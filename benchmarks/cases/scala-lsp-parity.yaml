        usage:
          location:
            uri: benchmark://source/src/main/scala/example/Workflow.scala
            range:
              start: { line: 26, character: 30 }
              end: { line: 26, character: 38 }
          kind: method
          displayName: renderer
        expectedDeclaration:
          location:
            uri: benchmark://source/src/main/scala/example/Workflow.scala
            range:
              start: { line: 10, character: 6 }
              end: { line: 10, character: 13 }
          kind: method
          displayName: default
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-23. ConsoleRenderer has both a
        class and companion object, and def default declares a parameterless
        method on that object. Each concrete renderer expression evaluates the
        imported alias and is therefore a required usage of default. The
        default and renderer tokens inside the import clause are optional
        bindings under bindings_optional; render is a separate method usage.
        Definition navigation from the alias expression must target def default.
        Parity source: scalameta/metals@0e01c3f6e56736e88f6bb276156b8049cbf3ca9d.
        Upstream reference: Metals definition suites for imports, renamed imports, and companion members.
        Adapted fixture: fixtures/scala/lsp-parity/.
        Maturity: renamed import usage sites should resolve back to the
        companion method declaration; import bindings remain optional. Metals
        1.6.7 and Bifrost 0.8.9 both return the two exact alias expressions and
        definition target.
