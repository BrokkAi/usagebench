            range:
              start: { line: 6, character: 15 }
              end: { line: 6, character: 21 }
          kind: method
          displayName: render
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-23. The imported renderer val
        is immutable and initialized by ConsoleRenderer.default, whose declared
        return type and body are exactly ConsoleRenderer. Its direct render call
        therefore belongs to ConsoleRenderer#render without a genuine trait
        dispatch ambiguity. Definition navigation must target the overriding
        def render rather than the abstract trait member.
        Parity source: scalameta/metals@0e01c3f6e56736e88f6bb276156b8049cbf3ca9d.
        Adapted fixture: fixtures/scala/lsp-parity/.
        Bifrost 0.8.9 returns the exact concrete call and overriding definition
        target. Metals 1.6.7 passes the case in isolation, but the complete
        parity run also returns the interface-typed trait call as an extra,
        exposing query-order-sensitive family expansion.
  - id: scala-parity-import-alias-companion-method
    declaration:
      location:
        uri: benchmark://source/src/main/scala/example/Workflow.scala
        range:
          start: { line: 10, character: 6 }
          end: { line: 10, character: 13 }
