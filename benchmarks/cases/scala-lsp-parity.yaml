          end: { line: 3, character: 12 }
      kind: method
      displayName: render
    expectedUsages:
      - location:
          uri: benchmark://source/src/main/scala/example/Workflow.scala
          range:
            start: { line: 6, character: 15 }
            end: { line: 6, character: 21 }
        kind: method
