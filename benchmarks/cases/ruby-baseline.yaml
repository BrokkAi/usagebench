            range:
              start: { line: 20, character: 4 }
              end: { line: 20, character: 19 }
          kind: method
          displayName: normalize_total
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-23. A top-level def in Ruby
        installs a private instance method on Object rather than a standalone
        function. The bare normalize_total call has the implicit receiver self;
        while render executes, self is the InvoiceReport instance, whose
        ancestor chain reaches Object. The call is therefore the sole method
        usage and Definition navigation must target the authored method body.
        Ruby LSP 0.26.10 and Solargraph 0.60.2 both return the exact call plus
        the queried method declaration, so declaration inclusion is an
        explicit allowed extra. Solargraph navigates to the enclosing authored
        method body. Ruby LSP returns no Definition, which is retained as a
        genuine miss on this implicit-self Object-ancestor edge.
