schemaVersion: 1
positionEncoding: utf-16
source:
  kind: fixture
  path: fixtures/ruby/baseline
language: ruby
cases:
  - id: ruby-require-relative-class-construction
    declaration:
      location:
        uri: benchmark://source/lib/billing/invoice.rb
        range:
          start: { line: 6, character: 8 }
          end: { line: 6, character: 15 }
      kind: class
      displayName: Invoice
    expectedUsages:
      - location:
          uri: benchmark://source/app/report.rb
          range:
            start: { line: 6, character: 25 }
            end: { line: 6, character: 32 }
        kind: class
        displayName: Invoice
    allowedExtraUsages:
      - location:
          uri: benchmark://source/app/report.rb
          range:
            start: { line: 9, character: 15 }
            end: { line: 9, character: 22 }
        kind: class
        displayName: Invoice
      - location:
          uri: benchmark://source/app/report.rb
          range:
            start: { line: 15, character: 15 }
            end: { line: 15, character: 22 }
        kind: class
        displayName: Invoice
    usageLookups:
      - usage:
          location:
            uri: benchmark://source/app/report.rb
            range:
              start: { line: 6, character: 25 }
              end: { line: 6, character: 32 }
          kind: class
          displayName: Invoice
        expectedDeclaration:
          location:
            uri: benchmark://source/lib/billing/invoice.rb
            range:
              start: { line: 6, character: 8 }
              end: { line: 6, character: 15 }
          kind: class
          displayName: Invoice
    verification:
      method: manual_inspection
      notes: report.rb requires billing/invoice and calls Billing::Invoice.build; the require_relative binding itself is not a usage.
  - id: ruby-relative-nested-constant
    declaration:
      location:
        uri: benchmark://source/lib/billing/money.rb
        range:
          start: { line: 2, character: 10 }
          end: { line: 2, character: 18 }
      kind: class
      displayName: Currency
    expectedUsages:
      - location:
          uri: benchmark://source/lib/billing/invoice.rb
          range:
            start: { line: 10, character: 30 }
            end: { line: 10, character: 38 }
        kind: class
        displayName: Currency
    usageLookups:
      - usage:
          location:
            uri: benchmark://source/lib/billing/invoice.rb
            range:
              start: { line: 10, character: 30 }
              end: { line: 10, character: 38 }
          kind: class
          displayName: Currency
        expectedDeclaration:
          location:
            uri: benchmark://source/lib/billing/money.rb
            range:
              start: { line: 2, character: 10 }
              end: { line: 2, character: 18 }
          kind: class
          displayName: Currency
    verification:
      method: manual_inspection
      notes: Invoice is lexically nested in Billing, so Money::Currency refers to Billing::Money::Currency from the required money.rb file.
  - id: ruby-superclass-reference
    declaration:
      location:
        uri: benchmark://source/lib/billing/record.rb
        range:
          start: { line: 1, character: 8 }
          end: { line: 1, character: 14 }
      kind: class
      displayName: Record
    expectedUsages:
      - location:
          uri: benchmark://source/lib/billing/invoice.rb
          range:
            start: { line: 6, character: 18 }
            end: { line: 6, character: 24 }
        kind: class
        displayName: Record
    usageLookups:
      - usage:
          location:
            uri: benchmark://source/lib/billing/invoice.rb
            range:
              start: { line: 6, character: 18 }
              end: { line: 6, character: 24 }
          kind: class
          displayName: Record
        expectedDeclaration:
          location:
            uri: benchmark://source/lib/billing/record.rb
            range:
              start: { line: 1, character: 8 }
              end: { line: 1, character: 14 }
          kind: class
          displayName: Record
    verification:
      method: manual_inspection
      notes: Invoice inherits from Record after requiring record.rb; this should be a superclass reference, not a generic text match.
  - id: ruby-include-instance-mixin
    declaration:
