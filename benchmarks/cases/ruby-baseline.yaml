        public_send(:audit) target are required usages because the receiver and
        method name are exact. public_send is a separate method identity and
        Auditable is a module reference. Definition navigation is required only
        from the direct call to Auditable#audit; the symbol literal would need
        a deliberate runtime-call-target operation for reverse navigation.
        Ruby LSP 0.26.10 and Solargraph 0.60.2 both return the direct call and
        method declaration but omit the literal public_send target. Probing
        from :audit does not expose an alternate audit reference family: Ruby
        LSP associates the position with public_send, while Solargraph returns
        none. The declaration is therefore an explicit allowed extra; the
        reflective call remains a deliberate semantic requirement rather than
        an LSP-derived one.
