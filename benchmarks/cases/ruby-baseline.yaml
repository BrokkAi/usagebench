            range:
              start: { line: 8, character: 14 }
              end: { line: 8, character: 25 }
          kind: method
          displayName: total_label
        expectedDeclaration:
          location:
            uri: benchmark://source/lib/billing/formatting.rb
            range:
              start: { line: 2, character: 8 }
              end: { line: 2, character: 19 }
          kind: method
          displayName: total_label
    verification:
      method: manual_inspection
      notes: Invoice prepends Formatting and also defines total_label; Ruby lookup should resolve invoice.total_label to the prepended module method.
  - id: ruby-extend-and-include-method-lookup
    declaration:
