          uri: benchmark://source/app/report.rb
          range:
            start: { line: 14, character: 27 }
            end: { line: 14, character: 32 }
        kind: method
        displayName: audit
    usageLookups:
      - usage:
          location:
            uri: benchmark://source/app/report.rb
            range:
              start: { line: 14, character: 27 }
              end: { line: 14, character: 32 }
          kind: method
          displayName: audit
        expectedDeclaration:
          location:
            uri: benchmark://source/lib/billing/auditable.rb
            range:
              start: { line: 2, character: 8 }
              end: { line: 2, character: 13 }
          kind: method
          displayName: audit
    verification:
      method: manual_inspection
      notes: invoice.public_send(:audit) names audit through a symbol at the call site; declaration scans should still include the direct invoice.audit usage for the same method.
