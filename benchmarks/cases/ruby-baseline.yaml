        DEFAULT_CURRENCY binding; the assignment introduces a constant rather
        than an executable definition body. Neither Ruby LSP 0.26.10 nor
        Solargraph 0.60.2 advertises the LSP Declaration operation, although
        both Definition probes reach the assignment (with enclosing ranges).
        Solargraph returns the read plus the assignment from the declaration.
        Ruby LSP returns no references from the assignment in a cold query, but
        the scored referenceProbe from the read returns the qualified read plus
        the assignment after indexing settles. This demonstrates
        occurrence-sensitive reference discovery rather than a semantic miss.
        Assignment inclusion is therefore an explicit allowed extra.
