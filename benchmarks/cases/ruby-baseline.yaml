          uri: benchmark://source/app/report.rb
          range:
            start: { line: 7, character: 14 }
            end: { line: 7, character: 19 }
        kind: method
        displayName: audit
      - location:
          uri: benchmark://source/app/report.rb
          range:
            start: { line: 14, character: 27 }
            end: { line: 14, character: 32 }
        kind: method
        displayName: audit
    usageLookups:
      - usage:
          location:
            uri: benchmark://source/app/report.rb
            range:
              start: { line: 7, character: 14 }
              end: { line: 7, character: 19 }
          kind: method
          displayName: audit
        expectedDeclaration:
          location:
            uri: benchmark://source/lib/billing/auditable.rb
            range:
              start: { line: 2, character: 8 }
              end: { line: 2, character: 13 }
          kind: method
          displayName: audit
    verification:
      method: manual_inspection
      notes: Invoice includes Auditable, and report.rb calls audit directly and through public_send on an Invoice instance constructed through Billing::Invoice.build.
  - id: ruby-prepend-method-precedence
    declaration:
      location:
        uri: benchmark://source/lib/billing/formatting.rb
        range:
          start: { line: 2, character: 8 }
          end: { line: 2, character: 19 }
