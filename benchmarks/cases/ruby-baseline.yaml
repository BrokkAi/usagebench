  - id: ruby-dynamic-public-send
    notPlanned:
      reason: Bifrost does not yet resolve Ruby public_send symbol arguments as dynamic method usages.
    declaration:
      location:
        uri: benchmark://source/lib/billing/auditable.rb
        range:
          start: { line: 2, character: 8 }
          end: { line: 2, character: 13 }
      kind: method
