            end: { line: 9, character: 22 }
        kind: class
        displayName: Invoice
      - location:
          uri: benchmark://source/app/report.rb
          range:
            start: { line: 15, character: 15 }
            end: { line: 15, character: 22 }
        kind: class
        displayName: Invoice
    allowedExtraUsages:
      - location:
          uri: benchmark://source/lib/billing/invoice.rb
          range:
            start: { line: 6, character: 8 }
            end: { line: 6, character: 15 }
        kind: class
        displayName: Invoice
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/app/report.rb
            range:
              start: { line: 6, character: 25 }
              end: { line: 6, character: 32 }
          kind: class
          displayName: Invoice
        expectedDeclaration:
          location:
            uri: benchmark://source/lib/billing/invoice.rb
            range:
              start: { line: 6, character: 8 }
              end: { line: 6, character: 15 }
          kind: class
          displayName: Invoice
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-23. All four visible Invoice
        tokens are required class usages: the build qualifier, explicit
        Invoice.new self-construction, DEFAULT_CURRENCY namespace qualifier,
        and last_build qualifier. Definition navigation from the build
        qualifier targets class Invoice. new is a separate method token, while
        the lowercase filename inside require_relative is not a class usage.
        Ruby LSP 0.26.10 and Solargraph 0.60.2 both returned all four semantic
        usages and also included the class declaration despite
        includeDeclaration=false, so declaration inclusion is an explicit
        allowed extra. Ruby LSP selected full Billing::Invoice paths for the
        three qualified references; Solargraph selected the full class body for
        definition navigation. These enclosing ranges are recorded as
        position_unverified rather than semantic failures.
