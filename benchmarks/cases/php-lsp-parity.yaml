schemaVersion: 1
positionEncoding: utf-16
source:
  kind: fixture
  path: fixtures/php/lsp-parity
language: php
cases:
  - id: php-parity-use-alias-static-method-call
    expectedFailure:
      reason: Bifrost baseline omits PHP static method calls through namespace import aliases from declaration-to-usage scans; tracked in bifrost#415.
    declaration:
      location:
        uri: benchmark://source/src/Service/EmailNotifier.php
        range:
          start: { line: 19, character: 27 }
          end: { line: 19, character: 33 }
      kind: method
      displayName: create
    expectedUsages:
      - location:
          uri: benchmark://source/src/Consumer.php
          range:
            start: { line: 6, character: 18 }
            end: { line: 6, character: 24 }
        kind: method
        displayName: create
    usageLookups:
      - usage:
          location:
            uri: benchmark://source/src/Consumer.php
            range:
              start: { line: 6, character: 18 }
              end: { line: 6, character: 24 }
          kind: method
          displayName: create
        expectedDeclaration:
          location:
            uri: benchmark://source/src/Service/EmailNotifier.php
            range:
              start: { line: 19, character: 27 }
              end: { line: 19, character: 33 }
          kind: method
          displayName: create
    verification:
      method: analyzer_comparison
      notes: >
        Parity source: phpactor/phpactor@be959c4e1b9f3dcefeca0b5971cbcaddff2df3e0.
        Upstream reference: lib/Indexer/Tests/Adapter/ReferenceFinder/IndexedReferenceFinderTest.php::provideMembers namespaced static members.
        Adapted fixture: fixtures/php/lsp-parity/.
        Maturity: a static method call through a namespace import alias should resolve to the method declaration.
  - id: php-parity-trait-method-call
    expectedFailure:
      reason: Bifrost baseline does not resolve PHP trait methods through classes using the trait; tracked in bifrost#416.
    declaration:
      location:
        uri: benchmark://source/src/Support/LogsEvents.php
        range:
          start: { line: 6, character: 20 }
          end: { line: 6, character: 26 }
      kind: method
      displayName: record
    expectedUsages:
      - location:
          uri: benchmark://source/src/Service/EmailNotifier.php
          range:
            start: { line: 16, character: 15 }
            end: { line: 16, character: 21 }
        kind: method
        displayName: record
      - location:
          uri: benchmark://source/src/Consumer.php
          range:
            start: { line: 8, character: 9 }
            end: { line: 8, character: 15 }
        kind: method
        displayName: record
    usageLookups:
      - usage:
          location:
            uri: benchmark://source/src/Consumer.php
            range:
              start: { line: 8, character: 9 }
              end: { line: 8, character: 15 }
          kind: method
          displayName: record
        expectedDeclaration:
          location:
            uri: benchmark://source/src/Support/LogsEvents.php
            range:
              start: { line: 6, character: 20 }
              end: { line: 6, character: 26 }
          kind: method
          displayName: record
    verification:
      method: analyzer_comparison
      notes: >
        Parity source: phpactor/phpactor@be959c4e1b9f3dcefeca0b5971cbcaddff2df3e0.
        Upstream reference: lib/Indexer/Tests/Adapter/ReferenceFinder/IndexedReferenceFinderTest.php::provideTraits single trait and implementation.
        Adapted fixture: fixtures/php/lsp-parity/.
        Maturity: trait methods should be found through both internal $this calls and external calls on a class using the trait.
  - id: php-parity-interface-method-implementation
    expectedFailure:
      reason: Bifrost baseline does not connect PHP interface methods to implementing methods and calls; tracked in bifrost#417.
    declaration:
      location:
        uri: benchmark://source/src/Contracts/Notifier.php
        range:
          start: { line: 6, character: 20 }
          end: { line: 6, character: 26 }
      kind: method
      displayName: notify
    expectedUsages:
      - location:
          uri: benchmark://source/src/Service/EmailNotifier.php
          range:
            start: { line: 13, character: 20 }
            end: { line: 13, character: 26 }
        kind: method
        displayName: notify
      - location:
          uri: benchmark://source/src/Consumer.php
          range:
            start: { line: 7, character: 9 }
            end: { line: 7, character: 15 }
        kind: method
        displayName: notify
    usageLookups:
      - usage:
          location:
            uri: benchmark://source/src/Service/EmailNotifier.php
            range:
              start: { line: 13, character: 20 }
              end: { line: 13, character: 26 }
          kind: method
          displayName: notify
        expectedDeclaration:
          location:
            uri: benchmark://source/src/Contracts/Notifier.php
            range:
              start: { line: 6, character: 20 }
              end: { line: 6, character: 26 }
          kind: method
          displayName: notify
    verification:
      method: analyzer_comparison
      notes: >
        Parity source: phpactor/phpactor@be959c4e1b9f3dcefeca0b5971cbcaddff2df3e0.
        Upstream reference: lib/Indexer/Tests/Adapter/ReferenceFinder/IndexedImplementationFinderTest.php::provideClassMembers interface member.
        Adapted fixture: fixtures/php/lsp-parity/.
        Maturity: an interface method should connect to its implementing method and calls on the implementation.
  - id: php-parity-static-property-access
    expectedFailure:
      reason: Bifrost baseline treats PHP static property reads as variable references instead of resolving to the declared static property; tracked in bifrost#415.
    declaration:
      location:
        uri: benchmark://source/src/Service/EmailNotifier.php
        range:
          start: { line: 11, character: 23 }
          end: { line: 11, character: 27 }
      kind: property
      displayName: "sent"
    expectedUsages:
      - location:
          uri: benchmark://source/src/Service/EmailNotifier.php
          range:
            start: { line: 15, character: 15 }
            end: { line: 15, character: 19 }
        kind: property
        displayName: "sent"
      - location:
          uri: benchmark://source/src/Consumer.php
          range:
            start: { line: 9, character: 18 }
            end: { line: 9, character: 22 }
        kind: property
        displayName: "sent"
    usageLookups:
      - usage:
          location:
            uri: benchmark://source/src/Consumer.php
            range:
              start: { line: 9, character: 18 }
              end: { line: 9, character: 22 }
          kind: property
          displayName: "sent"
        expectedDeclaration:
          location:
            uri: benchmark://source/src/Service/EmailNotifier.php
            range:
              start: { line: 11, character: 23 }
              end: { line: 11, character: 27 }
          kind: property
          displayName: "sent"
    verification:
      method: analyzer_comparison
      notes: >
        Parity source: phpactor/phpactor@be959c4e1b9f3dcefeca0b5971cbcaddff2df3e0.
        Upstream reference: lib/Indexer/Tests/Adapter/ReferenceFinder/IndexedReferenceFinderTest.php::provideMembers static properties.
        Adapted fixture: fixtures/php/lsp-parity/.
        Maturity: static property writes and reads should resolve back to the declared property.
  - id: php-parity-magic-get-not-planned
    notPlanned:
      reason: PHP magic __get property fallback is retained for parity tracking but is not scored until dynamic member lookup has a deliberate model.
    declaration:
      location:
        uri: benchmark://source/src/Service/EmailNotifier.php
        range:
          start: { line: 24, character: 20 }
          end: { line: 24, character: 25 }
      kind: method
      displayName: __get
    usageLookups:
      - usage:
          location:
            uri: benchmark://source/src/Consumer.php
            range:
              start: { line: 10, character: 18 }
              end: { line: 10, character: 29 }
          kind: property
          displayName: dynamicName
        expectedDeclaration:
          location:
            uri: benchmark://source/src/Service/EmailNotifier.php
            range:
              start: { line: 24, character: 20 }
              end: { line: 24, character: 25 }
          kind: method
          displayName: __get
    verification:
      method: analyzer_comparison
      notes: >
        Parity source: phpactor/phpactor@be959c4e1b9f3dcefeca0b5971cbcaddff2df3e0.
        Upstream reference: dynamic member behavior adjacent to PhpActor WorseReflection member-access inference tests.
        Adapted fixture: fixtures/php/lsp-parity/.
        Maturity: $mailer->dynamicName is intentionally unscored because the property is synthesized by __get.
