schemaVersion: 2
corpus:
  partition: development
  selection: analyzer_informed
groundTruth:
  status: legacy_unattributed
  reviewers: []
referencePolicy: bindings_optional
positionEncoding: utf-16
source:
  kind: fixture
  path: fixtures/go/lsp-parity
language: go
cases:
  - id: go-parity-cross-package-import-alias-function-call
    declaration:
      location:
        uri: benchmark://source/pkg/service/service.go
        range:
          start: { line: 15, character: 5 }
          end: { line: 15, character: 14 }
      kind: function
      displayName: NewWorker
    expectedUsages:
      - location:
          uri: benchmark://source/cmd/app/main.go
          range:
            start: { line: 5, character: 15 }
            end: { line: 5, character: 24 }
        kind: function
        displayName: NewWorker
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/cmd/app/main.go
            range:
              start: { line: 5, character: 15 }
              end: { line: 5, character: 24 }
          kind: function
          displayName: NewWorker
        expectedDeclaration:
          location:
            uri: benchmark://source/pkg/service/service.go
            range:
              start: { line: 15, character: 5 }
              end: { line: 15, character: 14 }
          kind: function
          displayName: NewWorker
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-22. NewWorker has one exact
        cross-package call through the svc import alias. The selector token is
        the function usage; svc is the package binding, and the types in the
        function body are separate symbols. Definition navigation reaches the
        NewWorker function body. gopls 0.23.0 returned exactly the selector
        usage and definition target.
        Parity source: golang/tools@ce1ac030f27092a75b323f20611767330fee68f3.
        Upstream reference: gopls/internal/test/marker/testdata/definition and references scenarios for imported package selectors.
        Adapted fixture: fixtures/go/lsp-parity/.
        Maturity: svc.NewWorker should resolve through the package import alias to the package function declaration.
  - id: go-parity-embedded-promoted-method-call
    declaration:
      location:
        uri: benchmark://source/pkg/service/service.go
        range:
          start: { line: 6, character: 19 }
          end: { line: 6, character: 25 }
      kind: method
      displayName: Record
    expectedUsages:
      - location:
          uri: benchmark://source/pkg/service/service.go
          range:
            start: { line: 24, character: 10 }
            end: { line: 24, character: 16 }
        kind: method
        displayName: Record
      - location:
          uri: benchmark://source/cmd/app/main.go
          range:
            start: { line: 6, character: 8 }
            end: { line: 6, character: 14 }
        kind: method
        displayName: Record
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/pkg/service/service.go
            range:
              start: { line: 24, character: 10 }
              end: { line: 24, character: 16 }
          kind: method
          displayName: Record
        expectedDeclaration:
          location:
            uri: benchmark://source/pkg/service/service.go
            range:
              start: { line: 6, character: 19 }
              end: { line: 6, character: 25 }
          kind: method
          displayName: Record
      - operation: definition
        usage:
          location:
            uri: benchmark://source/cmd/app/main.go
            range:
              start: { line: 6, character: 8 }
              end: { line: 6, character: 14 }
          kind: method
          displayName: Record
        expectedDeclaration:
          location:
            uri: benchmark://source/pkg/service/service.go
            range:
              start: { line: 6, character: 19 }
              end: { line: 6, character: 25 }
          kind: method
          displayName: Record
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-22. Both calls through
        *Worker receivers use the unambiguously promoted AuditLog.Record
        method. Embedding creates no separate authored Worker.Record symbol,
        so definition navigation from either call reaches the pointer-receiver
        method body on AuditLog. gopls 0.23.0 returned exactly both promoted
        calls and both definition targets.
        Parity source: golang/tools@ce1ac030f27092a75b323f20611767330fee68f3.
        Upstream reference: gopls/internal/test/marker/testdata/references and implementation scenarios for embedded fields and promoted methods.
        Adapted fixture: fixtures/go/lsp-parity/.
        Maturity: Worker embeds *AuditLog, so worker.Record should resolve to the promoted AuditLog.Record method.
  - id: go-parity-embedded-promoted-field-access
    declaration:
      location:
        uri: benchmark://source/pkg/service/service.go
        range:
          start: { line: 3, character: 1 }
          end: { line: 3, character: 5 }
      kind: field
      displayName: Last
    expectedUsages:
      - location:
          uri: benchmark://source/pkg/service/service.go
          range:
            start: { line: 7, character: 3 }
            end: { line: 7, character: 7 }
        kind: field
        displayName: Last
      - location:
          uri: benchmark://source/pkg/service/service.go
          range:
            start: { line: 8, character: 10 }
            end: { line: 8, character: 14 }
        kind: field
        displayName: Last
      - location:
          uri: benchmark://source/cmd/app/main.go
          range:
            start: { line: 7, character: 12 }
            end: { line: 7, character: 16 }
        kind: field
        displayName: Last
    usageLookups:
      - operation: declaration
        usage:
          location:
            uri: benchmark://source/cmd/app/main.go
            range:
              start: { line: 7, character: 12 }
              end: { line: 7, character: 16 }
          kind: field
          displayName: Last
        expectedDeclaration:
          location:
            uri: benchmark://source/pkg/service/service.go
            range:
              start: { line: 3, character: 1 }
              end: { line: 3, character: 5 }
          kind: field
          displayName: Last
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-22. The direct write and read
        plus the promoted read through *Worker all use AuditLog.Last.
        Embedding creates no separate authored Worker.Last field. Declaration
        navigation targets Last in the AuditLog struct. gopls 0.23.0 returned
        exactly all three usages but does not advertise
        textDocument/declaration.
        Parity source: golang/tools@ce1ac030f27092a75b323f20611767330fee68f3.
        Upstream reference: gopls/internal/test/marker/testdata/references scenarios for embedded fields and promoted selectors.
        Adapted fixture: fixtures/go/lsp-parity/.
        Maturity: Worker embeds *AuditLog, so worker.Last should resolve to the promoted AuditLog.Last field.
  - id: go-parity-build-tag-unsupported
    unsupported:
      reason: Go build-tag-sensitive files are retained for parity tracking but are not scored until benchmark cases and runners expose deliberate build constraints.
    declaration:
      location:
        uri: benchmark://source/pkg/service/integration.go
        range:
          start: { line: 4, character: 5 }
          end: { line: 4, character: 20 }
      kind: function
      displayName: IntegrationOnly
    usageLookups: []
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-22. IntegrationOnly is declared
        in a file guarded by the integration build tag, but this fixture has no
        usage site and the benchmark contract does not request -tags=integration.
        The case therefore remains unsupported rather than asserting an empty
        scored result. Promotion requires a caller guarded by the same tag, a
        benchmark-level -tags=integration setting honored by every runner, and
        required reference plus definition-navigation expectations.
        Parity source: golang/tools@ce1ac030f27092a75b323f20611767330fee68f3.
        Upstream reference: gopls marker tests for build tags and workspace/build configuration.
        Adapted fixture: fixtures/go/lsp-parity/.
        Maturity: build-tag-sensitive files remain intentionally unscored until
        the benchmark can prove that each runner loaded the requested build
        configuration.
