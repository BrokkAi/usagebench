    declaration:
      location: { uri: benchmark://source/src/service.rs, range: { start: { line: 1, character: 7 }, end: { line: 1, character: 10 } } }
      kind: method
      displayName: run
    expectedUsages:
      - location: { uri: benchmark://source/src/lib.rs, range: { start: { line: 6, character: 12 }, end: { line: 6, character: 15 } } }
        kind: method
        displayName: run
      - location: { uri: benchmark://source/src/lib.rs, range: { start: { line: 8, character: 12 }, end: { line: 8, character: 15 } } }
        kind: method
        displayName: run
    usageLookups:
      - operation: declaration
        usage:
          location: { uri: benchmark://source/src/lib.rs, range: { start: { line: 6, character: 12 }, end: { line: 6, character: 15 } } }
          kind: method
          displayName: run
        expectedDeclaration:
          location: { uri: benchmark://source/src/service.rs, range: { start: { line: 1, character: 7 }, end: { line: 1, character: 10 } } }
          kind: method
          displayName: run
      - operation: declaration
        usage:
          location: { uri: benchmark://source/src/lib.rs, range: { start: { line: 8, character: 12 }, end: { line: 8, character: 15 } } }
          kind: method
          displayName: run
        expectedDeclaration:
          location: { uri: benchmark://source/src/service.rs, range: { start: { line: 1, character: 7 }, end: { line: 1, character: 10 } } }
          kind: method
          displayName: run
    verification:
      method: manual_inspection
      notes: >
        Reviewed as correct by DavidBakerEffendi on 2026-07-17. Both
        Worker::run UFCS calls refer to the trait method declaration through the
        public barrel re-export, including the LocalAlias receiver. Ordinary
        declaration navigation should reach the trait contract rather than
        guess a runtime implementation; the concrete override belongs to a
        distinct implementation operation.
