        kind: method
        displayName: Create
    usageLookups:
      - operation: definition
        usage:
          location: { uri: benchmark://source/Precision.cs, range: { start: { line: 19, character: 43 }, end: { line: 19, character: 49 } } }
          kind: method
          displayName: Create
        expectedDeclaration:
          location: { uri: benchmark://source/Precision.cs, range: { start: { line: 14, character: 25 }, end: { line: 14, character: 31 } } }
          kind: method
          displayName: Create
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-21. Labels.Create() is a
        direct class-qualified static call with one exact method identity. It
