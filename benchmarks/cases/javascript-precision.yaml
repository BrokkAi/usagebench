    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-22. The factory construction,
        runtime CommonJS export read, and downstream construction through the
        barrel all use the Client class value. The destructuring token is an
        optional import binding. This class-identity case classifies both
        construction tokens as class usages; a separate constructor query may
        classify the same tokens as constructor calls. Definition navigation
        from the downstream construction targets class Client. There is no
        explicit constructor body and therefore no secondary constructor
        target in this fixture. TypeScript Language Server 5.3.0 found the
        local construction and export read but missed the downstream
        construction across the barrel; reverse definition navigation from
        that same downstream token nevertheless reached class Client exactly.
