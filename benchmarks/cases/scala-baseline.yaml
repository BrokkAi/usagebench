schemaVersion: 2
corpus:
  partition: development
  selection: analyzer_informed
groundTruth:
  status: legacy_unattributed
  reviewers: []
referencePolicy: bindings_optional
positionEncoding: utf-16
source:
  kind: fixture
  path: fixtures/scala/baseline
language: scala
cases:
  - id: scala-class-construction
    declaration:
      location:
        uri: benchmark://source/src/main/scala/example/Service.scala
        range:
          start: { line: 15, character: 6 }
          end: { line: 15, character: 13 }
      kind: class
      displayName: Service
    expectedUsages:
      - location:
          uri: benchmark://source/src/main/scala/example/Service.scala
          range:
            start: { line: 23, character: 37 }
            end: { line: 23, character: 44 }
        kind: class
        displayName: Service
      - location:
          uri: benchmark://source/src/main/scala/example/Service.scala
          range:
            start: { line: 23, character: 51 }
            end: { line: 23, character: 58 }
        kind: constructor
        displayName: Service
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/main/scala/example/Service.scala
            range:
              start: { line: 23, character: 51 }
              end: { line: 23, character: 58 }
          kind: constructor
          displayName: Service
        expectedDeclaration:
          location:
            uri: benchmark://source/src/main/scala/example/Service.scala
            range:
              start: { line: 15, character: 6 }
              end: { line: 15, character: 13 }
          kind: constructor
          displayName: Service
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-23. The Service return type
        and Service in new Service(repository) are both required usages of the
        class. object Service is the companion-object declaration rather than
        a class usage. The new expression is additionally classified as a
        constructor occurrence. Definition navigation from that constructor
        token must target class Service, which defines Scala's primary
        constructor. Metals 1.6.7 returns both required class occurrences and
        navigates the constructor exactly, but also includes Service in
        Service.build: that qualifier resolves to the companion object and
        remains genuine class-reference noise. Bifrost 0.8.9 returns the exact
        authored class family and navigation target.
  - id: scala-companion-method-call
    declaration:
      location:
        uri: benchmark://source/src/main/scala/example/Service.scala
        range:
          start: { line: 23, character: 6 }
          end: { line: 23, character: 11 }
      kind: method
      displayName: build
    expectedUsages:
      - location:
          uri: benchmark://source/src/main/scala/example/Consumer.scala
          range:
            start: { line: 5, character: 26 }
            end: { line: 5, character: 31 }
        kind: method
        displayName: build
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/main/scala/example/Consumer.scala
            range:
              start: { line: 5, character: 26 }
              end: { line: 5, character: 31 }
          kind: method
          displayName: build
        expectedDeclaration:
          location:
            uri: benchmark://source/src/main/scala/example/Service.scala
            range:
              start: { line: 23, character: 6 }
              end: { line: 23, character: 11 }
          kind: method
          displayName: build
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-23. def build declares a
        method on the Service companion object, not a FunctionN value. The
        build token in Service.build(repository) is its sole required usage;
        Service is a separate usage of the companion object. Definition
        navigation must target the authored def build body. Metals 1.6.7 and
        Bifrost 0.8.9 both return the exact call and definition target.
  - id: scala-method-call
    declaration:
      location:
        uri: benchmark://source/src/main/scala/example/Service.scala
        range:
          start: { line: 16, character: 6 }
          end: { line: 16, character: 13 }
      kind: method
      displayName: execute
    expectedUsages:
      - location:
          uri: benchmark://source/src/main/scala/example/Consumer.scala
          range:
            start: { line: 6, character: 25 }
            end: { line: 6, character: 32 }
        kind: method
        displayName: execute
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/main/scala/example/Consumer.scala
            range:
              start: { line: 6, character: 25 }
              end: { line: 6, character: 32 }
          kind: method
          displayName: execute
        expectedDeclaration:
          location:
            uri: benchmark://source/src/main/scala/example/Service.scala
            range:
              start: { line: 16, character: 6 }
              end: { line: 16, character: 13 }
          kind: method
          displayName: execute
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-23. service is an immutable
        local initialized by Service.build, whose declared return type is
        Service and whose body constructs new Service. With no subclasses,
        overrides, reassignment, or competing execute methods in the fixture,
        service.execute is the sole required usage of Service#execute.
        Definition navigation must target the authored def execute body.
        Bifrost 0.8.9 returns the exact reference and definition target. Metals
        1.6.7 returns the exact reference family but no Definition target in an
        isolated run; the complete Scala run passes the same case exactly after
        earlier baseline queries. This is query-order-sensitive analysis rather
        than evidence of ambiguity in the closed fixture.
  - id: scala-var-field-access
    declaration:
      location:
        uri: benchmark://source/src/main/scala/example/Service.scala
        range:
          start: { line: 7, character: 6 }
          end: { line: 7, character: 10 }
      kind: field
      displayName: last
    expectedUsages:
      - location:
          uri: benchmark://source/src/main/scala/example/Service.scala
          range:
            start: { line: 10, character: 4 }
            end: { line: 10, character: 8 }
        kind: field
        displayName: last
      - location:
          uri: benchmark://source/src/main/scala/example/Service.scala
          range:
            start: { line: 11, character: 4 }
            end: { line: 11, character: 8 }
        kind: field
        displayName: last
      - location:
          uri: benchmark://source/src/main/scala/example/Consumer.scala
          range:
            start: { line: 7, character: 42 }
            end: { line: 7, character: 46 }
        kind: field
        displayName: last
    usageLookups:
      - operation: declaration
        usage:
          location:
            uri: benchmark://source/src/main/scala/example/Consumer.scala
            range:
              start: { line: 7, character: 42 }
              end: { line: 7, character: 46 }
          kind: field
          displayName: last
        expectedDeclaration:
          location:
            uri: benchmark://source/src/main/scala/example/Service.scala
            range:
              start: { line: 7, character: 6 }
              end: { line: 7, character: 10 }
          kind: field
          displayName: last
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-23. var last declares one
        source-level mutable property on Repository. The assignment and read in
        save plus the external repository.last read are all required usages.
        Although Scala generates getter and setter members for a var, source
        usage analysis keeps those accessor operations in the same last
        property family. Declaration navigation from repository.last must land
        on the last token in var last. The case was renamed from
        scala-field-and-val-access because it contains no val access. Bifrost
        0.8.9 returns the exact property family and declaration target. Metals
        1.6.7 returns the exact references but does not advertise the LSP
        Declaration operation, so navigation is correctly reported as
        unsupported rather than silently substituted with Definition.
  - id: scala-object-val-access
    declaration:
      location:
        uri: benchmark://source/src/main/scala/example/Service.scala
        range:
          start: { line: 3, character: 6 }
          end: { line: 3, character: 12 }
      kind: constant
      displayName: Prefix
    expectedUsages:
      - location:
          uri: benchmark://source/src/main/scala/example/Service.scala
          range:
            start: { line: 18, character: 17 }
            end: { line: 18, character: 23 }
        kind: constant
        displayName: Prefix
      - location:
          uri: benchmark://source/src/main/scala/example/Consumer.scala
          range:
            start: { line: 7, character: 13 }
            end: { line: 7, character: 19 }
        kind: constant
        displayName: Prefix
    usageLookups:
      - operation: declaration
        usage:
          location:
            uri: benchmark://source/src/main/scala/example/Consumer.scala
            range:
              start: { line: 7, character: 13 }
              end: { line: 7, character: 19 }
          kind: constant
          displayName: Prefix
        expectedDeclaration:
          location:
            uri: benchmark://source/src/main/scala/example/Service.scala
            range:
              start: { line: 3, character: 6 }
              end: { line: 3, character: 12 }
          kind: constant
          displayName: Prefix
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-23. val Prefix introduces an
        immutable stable member on object Defaults. The reads in
        Service#execute and Consumer.run are both required usages; each
        Defaults qualifier is a separate usage of the singleton object.
        Although Scala compiles the val through an accessor, source navigation
        must use Declaration and target the Prefix token in val Prefix.
        Bifrost 0.8.9 returns the exact reads and declaration target. Metals
        1.6.7 returns the exact reads but does not advertise LSP Declaration,
        so navigation is reported as unsupported.
