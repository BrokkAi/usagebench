language: java
cases:
  - id: java-parity-static-import-method-call
    declaration:
      location:
        uri: benchmark://source/src/main/java/example/parity/Names.java
        range:
          start: { line: 6, character: 25 }
          end: { line: 6, character: 34 }
      kind: method
      displayName: normalize
    expectedUsages:
      - location:
          uri: benchmark://source/src/main/java/example/parity/ConsoleHandler.java
          range:
            start: { line: 5, character: 21 }
            end: { line: 5, character: 30 }
        kind: method
        displayName: normalize
      - location:
          uri: benchmark://source/src/main/java/example/parity/StaticImportUser.java
          range:
            start: { line: 6, character: 15 }
            end: { line: 6, character: 24 }
        kind: method
        displayName: normalize
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/main/java/example/parity/StaticImportUser.java
            range:
              start: { line: 6, character: 15 }
              end: { line: 6, character: 24 }
          kind: method
          displayName: normalize
        expectedDeclaration:
          location:
            uri: benchmark://source/src/main/java/example/parity/Names.java
            range:
              start: { line: 6, character: 25 }
              end: { line: 6, character: 34 }
          kind: method
          displayName: normalize
    verification:
      method: analyzer_comparison
      notes: >
        Reviewed as correct by DavidBakerEffendi on 2026-07-18. Both qualified
        and statically imported calls reach the concrete Names.normalize method
        definition; the static-import binding is optional under
        bindings_optional.
        Parity source: eclipse-jdtls/eclipse.jdt.ls@4c4f2230f81bf8371661de77bca0c3375f5ce399.
        Upstream reference: org.eclipse.jdt.ls.tests NavigateToDefinitionHandlerTest and ReferencesHandlerTest source-location behavior.
        Adapted fixture: fixtures/java/lsp-parity/.
        Maturity: static-import calls should resolve to the imported static
        method; the import declaration is an optional binding rather than a
        required usage.
  - id: java-parity-interface-receiver-method-call
    declaration:
      location:
        uri: benchmark://source/src/main/java/example/parity/Handler.java
        range:
          start: { line: 3, character: 11 }
          end: { line: 3, character: 17 }
      kind: method
      displayName: handle
    expectedUsages:
      - location:
          uri: benchmark://source/src/main/java/example/parity/Runner.java
          range:
            start: { line: 6, character: 23 }
            end: { line: 6, character: 29 }
        kind: method
        displayName: handle
      - location:
          uri: benchmark://source/src/main/java/example/parity/Runner.java
          range:
            start: { line: 19, character: 31 }
            end: { line: 19, character: 37 }
        kind: method
        displayName: handle
    usageLookups:
      - operation: declaration
        usage:
          location:
            uri: benchmark://source/src/main/java/example/parity/Runner.java
            range:
              start: { line: 6, character: 23 }
              end: { line: 6, character: 29 }
          kind: method
          displayName: handle
        expectedDeclaration:
          location:
            uri: benchmark://source/src/main/java/example/parity/Handler.java
            range:
              start: { line: 3, character: 11 }
              end: { line: 3, character: 17 }
          kind: method
          displayName: handle
      - operation: declaration
        usage:
          location:
            uri: benchmark://source/src/main/java/example/parity/Runner.java
            range:
              start: { line: 19, character: 31 }
              end: { line: 19, character: 37 }
          kind: method
          displayName: handle
        expectedDeclaration:
          location:
            uri: benchmark://source/src/main/java/example/parity/Handler.java
            range:
              start: { line: 3, character: 11 }
              end: { line: 3, character: 17 }
          kind: method
          displayName: handle
    verification:
      method: analyzer_comparison
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-18. Both handler.handle and
        makeAnonymous().handle have the statically declared Handler contract,
        so declaration navigation conservatively reaches Handler.handle without
        claiming a runtime implementation. Concrete overrides are not ordinary
        usages of the interface declaration.
        Parity source: eclipse-jdtls/eclipse.jdt.ls@4c4f2230f81bf8371661de77bca0c3375f5ce399.
        Upstream test: org.eclipse.jdt.ls.tests/.../ImplementationsHandlerTest.java::testMethodInvocationImplementation.
        Adapted fixture: fixtures/java/lsp-parity/.
        Maturity: both interface-typed calls resolve to Handler.handle without
        treating an implementation override as the declaration.
  - id: java-parity-concrete-implementation-method-call
    declaration:
      location:
        uri: benchmark://source/src/main/java/example/parity/ConsoleHandler.java
        range:
          start: { line: 4, character: 18 }
          end: { line: 4, character: 24 }
      kind: method
      displayName: handle
    expectedUsages:
      - location:
          uri: benchmark://source/src/main/java/example/parity/Runner.java
          range:
            start: { line: 6, character: 54 }
            end: { line: 6, character: 60 }
        kind: method
        displayName: handle
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/main/java/example/parity/Runner.java
            range:
              start: { line: 6, character: 54 }
              end: { line: 6, character: 60 }
          kind: method
          displayName: handle
        expectedDeclaration:
          location:
            uri: benchmark://source/src/main/java/example/parity/ConsoleHandler.java
            range:
              start: { line: 4, character: 18 }
              end: { line: 4, character: 24 }
          kind: method
          displayName: handle
    verification:
      method: analyzer_comparison
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-18. direct has the concrete
        ConsoleHandler type, so its call resolves to the overriding
        ConsoleHandler.handle definition. The interface declaration and the
        makeAnonymous().handle call are not usages of this concrete method;
        the latter remains conservatively linked to Handler.handle because the
        method's declared return type is Handler.
        Parity source: eclipse-jdtls/eclipse.jdt.ls@4c4f2230f81bf8371661de77bca0c3375f5ce399.
        Upstream test: org.eclipse.jdt.ls.tests/.../ImplementationsHandlerTest.java::testMethodImplementation.
        Adapted fixture: fixtures/java/lsp-parity/.
        Maturity: direct.handle resolves to ConsoleHandler.handle; the
        interface-dispatch call does not broaden to this concrete implementation.
  - id: java-parity-interface-local-type-lookup
    typeLookups:
      - expression:
          location:
            uri: benchmark://source/src/main/java/example/parity/Runner.java
            range:
              start: { line: 4, character: 16 }
              end: { line: 4, character: 23 }
          kind: variable
          displayName: handler
        expectedType:
          location:
            uri: benchmark://source/src/main/java/example/parity/Handler.java
            range:
              start: { line: 2, character: 17 }
              end: { line: 2, character: 24 }
          kind: interface
          displayName: Handler
    verification:
      method: analyzer_comparison
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-18. The local variable's
        declared type is Handler, so type-definition lookup correctly reaches
        the Handler interface even though the initializer constructs a
        ConsoleHandler.
        Parity source: eclipse-jdtls/eclipse.jdt.ls@4c4f2230f81bf8371661de77bca0c3375f5ce399.
        Upstream test: org.eclipse.jdt.ls.tests/.../NavigateToTypeDefinitionHandlerTest.java::testLocalVariable.
        Adapted fixture: fixtures/java/lsp-parity/.
        Maturity: the local variable handler has an explicit Handler interface type that type definition should recover.
