schemaVersion: 2
corpus:
  partition: development
  selection: analyzer_informed
groundTruth:
  status: legacy_unattributed
  reviewers: []
referencePolicy: bindings_optional
positionEncoding: utf-16
source:
  kind: fixture
  path: fixtures/javascript/baseline
language: javascript
cases:
  - id: js-commonjs-exported-member-usage
    declaration:
      location:
        uri: benchmark://source/src/commonjs-request.js
        range:
          start: { line: 0, character: 8 }
          end: { line: 0, character: 15 }
      kind: function
      displayName: accepts
    expectedUsages:
      - location:
          uri: benchmark://source/src/commonjs-consumer.js
          range:
            start: { line: 2, character: 28 }
            end: { line: 2, character: 35 }
        kind: function
        displayName: accepts
      - location:
          uri: benchmark://source/src/commonjs-consumer.js
          range:
            start: { line: 5, character: 17 }
            end: { line: 5, character: 24 }
        kind: function
        displayName: accepts
    usageLookups:
      - operation: declaration
        usage:
          location:
            uri: benchmark://source/src/commonjs-consumer.js
            range:
              start: { line: 2, character: 28 }
              end: { line: 2, character: 35 }
          kind: function
          displayName: accepts
        expectedDeclaration:
          location:
            uri: benchmark://source/src/commonjs-request.js
            range:
              start: { line: 0, character: 8 }
              end: { line: 0, character: 15 }
          kind: function
          displayName: accepts
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-22. The accepts property in
        exports.accepts is the CommonJS export declaration, and both
        request.accepts selectors are usages. The named function-expression
        binding in function accepts is a distinct function-local identity and
        is excluded. Declaration navigation from the imported member stops at
        the exported property assignment. Both fixture files pass node --check.
        TypeScript Language Server 5.3.0 returned exactly both usages but does
        not advertise textDocument/declaration. A non-scored definition probe
        instead navigated to the distinct function-expression name.
  - id: js-named-export-import-function
    declaration:
      location:
        uri: benchmark://source/src/components.js
        range:
          start: { line: 12, character: 16 }
          end: { line: 12, character: 26 }
      kind: function
      displayName: formatName
    expectedUsages:
      - location:
          uri: benchmark://source/src/components.js
          range:
            start: { line: 8, character: 29 }
            end: { line: 8, character: 39 }
        kind: function
        displayName: formatName
      - location:
          uri: benchmark://source/src/app.js
          range:
            start: { line: 6, character: 14 }
            end: { line: 6, character: 24 }
        kind: function
        displayName: formatName
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/app.js
            range:
              start: { line: 6, character: 14 }
              end: { line: 6, character: 24 }
          kind: function
          displayName: formatName
        expectedDeclaration:
          location:
            uri: benchmark://source/src/components.js
            range:
              start: { line: 12, character: 16 }
              end: { line: 12, character: 26 }
          kind: function
          displayName: formatName
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-22. formatName is defined by
        the exported function declaration and called once locally and once
        through the named ES-module import. The import specifier is an optional
        binding rather than a required usage. Definition navigation from the
        imported call targets the authored function body. Both ES-module files
        pass node --check, and TypeScript Language Server 5.3.0 returned the
        exact usage set and definition target.
  - id: js-class-construction
    declaration:
      location:
        uri: benchmark://source/src/components.js
        range:
          start: { line: 2, character: 13 }
          end: { line: 2, character: 20 }
      kind: class
      displayName: Greeter
    expectedUsages:
      - location:
          uri: benchmark://source/src/app.js
          range:
            start: { line: 4, character: 19 }
            end: { line: 4, character: 26 }
        kind: constructor
        displayName: Greeter
      - location:
          uri: benchmark://source/src/components.js
          range:
            start: { line: 17, character: 13 }
            end: { line: 17, character: 20 }
        kind: constructor
        displayName: Greeter
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/app.js
            range:
              start: { line: 4, character: 19 }
              end: { line: 4, character: 26 }
          kind: constructor
          displayName: Greeter
        expectedDeclaration:
          location:
            uri: benchmark://source/src/components.js
            range:
              start: { line: 2, character: 13 }
              end: { line: 2, character: 20 }
          kind: class
          displayName: Greeter
        allowedExtraTargets:
          - location:
              uri: benchmark://source/src/components.js
              range:
                start: { line: 3, character: 2 }
                end: { line: 3, character: 13 }
            kind: constructor
            displayName: constructor
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-22. Greeter is constructed
        directly in app and inside createGreeter, so both new-expression class
        tokens are constructor-call usages. JavaScript has no separately named
        constructor token at those call sites, and definition navigation
        targets the Greeter class definition rather than the constructor
        keyword. The app import specifier is an optional binding. TypeScript
        Language Server 5.3.0 returned the exact construction usages but
        returned both the class token and explicit constructor member for
        definition navigation. The constructor is a reasonable control-flow
        alternate, while the class binding remains canonical for the Greeter
        cursor token. The reviewed constructor member is therefore recorded as
        an allowed cross-kind navigation target. TypeScript Language Server
        still scores position-unverified because its constructor result spans
        the enclosing body rather than the authored token; Bifrost 0.8.9
        returns the exact canonical target.
  - id: js-method-call
    declaration:
      location:
        uri: benchmark://source/src/components.js
        range:
          start: { line: 7, character: 2 }
          end: { line: 7, character: 7 }
      kind: method
      displayName: greet
    expectedUsages:
      - location:
          uri: benchmark://source/src/app.js
          range:
            start: { line: 5, character: 24 }
            end: { line: 5, character: 29 }
        kind: method
        displayName: greet
      - location:
          uri: benchmark://source/src/app.js
          range:
            start: { line: 9, character: 16 }
            end: { line: 9, character: 21 }
        kind: method
        displayName: greet
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/app.js
            range:
              start: { line: 5, character: 24 }
              end: { line: 5, character: 29 }
          kind: method
          displayName: greet
        expectedDeclaration:
          location:
            uri: benchmark://source/src/components.js
            range:
              start: { line: 7, character: 2 }
              end: { line: 7, character: 7 }
          kind: method
          displayName: greet
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-22. greet is defined on
        Greeter and called once through the value returned directly by
        createGreeter and once through a directly constructed Greeter. Both
        receiver paths are unambiguous, and definition navigation targets the
        greet method body. Receiver, constructor, and property tokens are
        separate identities. Both files pass node --check, and TypeScript
        Language Server 5.3.0 returned the exact usage set and definition
        target.
  - id: js-class-property-access
    declaration:
      location:
        uri: benchmark://source/src/components.js
        range:
          start: { line: 4, character: 9 }
          end: { line: 4, character: 14 }
      kind: property
      displayName: title
    expectedUsages:
      - location:
          uri: benchmark://source/src/components.js
          range:
            start: { line: 8, character: 19 }
            end: { line: 8, character: 24 }
        kind: property
        displayName: title
    usageLookups:
      - operation: declaration
        usage:
          location:
            uri: benchmark://source/src/components.js
            range:
              start: { line: 8, character: 19 }
              end: { line: 8, character: 24 }
          kind: property
          displayName: title
        expectedDeclaration:
          location:
            uri: benchmark://source/src/components.js
            range:
              start: { line: 4, character: 9 }
              end: { line: 4, character: 14 }
          kind: property
          displayName: title
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-22. this.title on the
        constructor assignment is the inferred Greeter instance-property
        declaration, and the this.title read in greet is its sole usage. The
        constructor parameter and right-hand-side title read are a separate
        local binding. Declaration navigation from the property read targets
        the left-hand property token. TypeScript Language Server 5.3.0 returned
        the exact property usage but does not advertise
        textDocument/declaration; a non-scored definition probe reached the
        same left-hand property token exactly.
