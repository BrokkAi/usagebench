schemaVersion: 1
positionEncoding: utf-16
source:
  kind: fixture
  path: fixtures/rust/baseline
language: rust
cases:
  - id: rust-function-call-and-reexport
    declaration:
      location:
        uri: benchmark://source/src/service.rs
        range:
          start: { line: 29, character: 7 }
          end: { line: 29, character: 20 }
      kind: function
      displayName: build_service
    expectedUsages:
      - location:
          uri: benchmark://source/src/lib.rs
          range:
            start: { line: 10, character: 18 }
            end: { line: 10, character: 31 }
        kind: function
        displayName: build_service
    usageLookups:
      - usage:
          location:
            uri: benchmark://source/src/lib.rs
            range:
              start: { line: 10, character: 18 }
              end: { line: 10, character: 31 }
          kind: function
          displayName: build_service
        expectedDeclaration:
          location:
            uri: benchmark://source/src/service.rs
            range:
              start: { line: 29, character: 7 }
              end: { line: 29, character: 20 }
          kind: function
          displayName: build_service
    verification:
      method: manual_inspection
      notes: build_service is called from run_demo; the lib.rs re-export binding is not counted as a usage.
  - id: rust-struct-construction
