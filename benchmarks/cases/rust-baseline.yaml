          uri: benchmark://source/src/service.rs
          range:
            start: { line: 29, character: 54 }
            end: { line: 29, character: 61 }
        kind: type
        displayName: Service
      - location:
          uri: benchmark://source/src/service.rs
          range:
            start: { line: 18, character: 5 }
            end: { line: 18, character: 12 }
        kind: type
        displayName: Service
      - location:
          uri: benchmark://source/src/service.rs
          range:
            start: { line: 30, character: 4 }
            end: { line: 30, character: 11 }
        kind: type
        displayName: Service
    usageLookups:
      - usage:
          location:
            uri: benchmark://source/src/service.rs
            range:
              start: { line: 30, character: 4 }
              end: { line: 30, character: 11 }
          kind: type
          displayName: Service
        expectedDeclaration:
