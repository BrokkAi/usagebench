          uri: benchmark://source/src/lib.rs
          range:
            start: { line: 18, character: 34 }
            end: { line: 18, character: 41 }
        kind: method
        displayName: execute
    usageLookups:
      - usage:
          location:
            uri: benchmark://source/src/lib.rs
            range:
              start: { line: 18, character: 34 }
              end: { line: 18, character: 41 }
          kind: method
          displayName: execute
        expectedDeclaration:
          location:
