schemaVersion: 2
corpus:
  partition: development
  selection: analyzer_informed
groundTruth:
  status: legacy_unattributed
  reviewers: []
referencePolicy: bindings_optional
positionEncoding: utf-16
source:
  kind: fixture
  path: fixtures/rust/baseline
language: rust
cases:
  - id: rust-function-call-and-reexport
    declaration:
      location:
        uri: benchmark://source/src/service.rs
        range:
          start: { line: 29, character: 7 }
          end: { line: 29, character: 20 }
      kind: function
      displayName: build_service
    expectedUsages:
      - location:
          uri: benchmark://source/src/lib.rs
          range:
            start: { line: 10, character: 18 }
            end: { line: 10, character: 31 }
        kind: function
        displayName: build_service
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/lib.rs
            range:
              start: { line: 10, character: 18 }
              end: { line: 10, character: 31 }
          kind: function
          displayName: build_service
        expectedDeclaration:
          location:
            uri: benchmark://source/src/service.rs
            range:
              start: { line: 29, character: 7 }
              end: { line: 29, character: 20 }
          kind: function
          displayName: build_service
    verification:
      method: manual_inspection
      notes: >
        Reviewed as correct and clear by DavidBakerEffendi on 2026-07-17.
        build_service is called from run_demo and definition navigation from
        that call targets the function body in service.rs. The lib.rs re-export
        binding is optional under bindings_optional.
  - id: rust-struct-construction
    declaration:
      location:
        uri: benchmark://source/src/service.rs
        range:
          start: { line: 14, character: 11 }
          end: { line: 14, character: 18 }
      kind: type
      displayName: Service
    expectedUsages:
      - location:
          uri: benchmark://source/src/service.rs
          range:
            start: { line: 29, character: 54 }
            end: { line: 29, character: 61 }
        kind: type
        displayName: Service
      - location:
          uri: benchmark://source/src/service.rs
          range:
            start: { line: 18, character: 5 }
            end: { line: 18, character: 12 }
        kind: type
        displayName: Service
      - location:
          uri: benchmark://source/src/service.rs
          range:
              start: { line: 30, character: 4 }
              end: { line: 30, character: 11 }
        kind: type
        displayName: Service
      - location:
          uri: benchmark://source/src/service.rs
          range:
              start: { line: 19, character: 48 }
              end: { line: 19, character: 52 }
        kind: type
        displayName: Self
      - location:
          uri: benchmark://source/src/service.rs
          range:
              start: { line: 20, character: 8 }
              end: { line: 20, character: 12 }
        kind: type
        displayName: Self
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/service.rs
            range:
              start: { line: 30, character: 4 }
              end: { line: 30, character: 11 }
          kind: type
          displayName: Service
        expectedDeclaration:
          location:
            uri: benchmark://source/src/service.rs
            range:
              start: { line: 14, character: 11 }
              end: { line: 14, character: 18 }
          kind: type
          displayName: Service
    verification:
      method: manual_inspection
      notes: >
        Reviewed as correct by DavidBakerEffendi on 2026-07-17. Service is used
        in the impl header, as build_service's return type, and as the
        Service::new qualifier. Capital-Self in the new return type and struct
        expression is also required because Rust defines it as the current
        implementing type. Lowercase self remains excluded because it is the
        method's value receiver. The lib.rs re-export is optional under
        bindings_optional. See BrokkAi/bifrost#882 for the Bifrost parity gap.
  - id: rust-method-call
    declaration:
      location:
          uri: benchmark://source/src/service.rs
          range:
            start: { line: 23, character: 11 }
            end: { line: 23, character: 18 }
      kind: method
      displayName: execute
    expectedUsages:
      - location:
          uri: benchmark://source/src/lib.rs
          range:
            start: { line: 18, character: 34 }
            end: { line: 18, character: 41 }
        kind: method
        displayName: execute
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/src/lib.rs
            range:
              start: { line: 18, character: 34 }
              end: { line: 18, character: 41 }
          kind: method
          displayName: execute
        expectedDeclaration:
          location:
            uri: benchmark://source/src/service.rs
            range:
              start: { line: 23, character: 11 }
              end: { line: 23, character: 18 }
          kind: method
          displayName: execute
    verification:
      method: manual_inspection
      notes: >
        Reviewed as correct by DavidBakerEffendi on 2026-07-17. run_demo calls
        the concrete Service::execute definition returned by build_service; no
        related method-family or receiver tokens are expected.
  - id: rust-field-write
    declaration:
      location:
        uri: benchmark://source/src/service.rs
        range:
          start: { line: 4, character: 8 }
          end: { line: 4, character: 12 }
      kind: field
      displayName: last
    expectedUsages:
      - location:
          uri: benchmark://source/src/service.rs
          range:
            start: { line: 9, character: 13 }
            end: { line: 9, character: 17 }
        kind: field
        displayName: last
    usageLookups:
      - operation: declaration
        usage:
          location:
            uri: benchmark://source/src/service.rs
            range:
              start: { line: 9, character: 13 }
              end: { line: 9, character: 17 }
          kind: field
          displayName: last
        expectedDeclaration:
          location:
            uri: benchmark://source/src/service.rs
            range:
              start: { line: 4, character: 8 }
              end: { line: 4, character: 12 }
          kind: field
          displayName: last
    verification:
      method: manual_inspection
      notes: >
        Reviewed as correct by DavidBakerEffendi on 2026-07-17. last is declared
        on MemoryRepository and written inside save. Navigation from the write
        is declaration-only because the field has no implementation body;
        lowercase self is not a field or owning-type usage.
  - id: rust-explicit-local-and-parameter-type-lookup
    usageLookups: []
    typeLookups:
      - expression:
          location:
            uri: benchmark://source/src/service.rs
            range:
              start: { line: 52, character: 21 }
              end: { line: 52, character: 32 }
          kind: variable
          displayName: local_label
        expectedType:
          location:
            uri: benchmark://source/src/service.rs
            range:
              start: { line: 36, character: 11 }
              end: { line: 36, character: 21 }
          kind: type
          displayName: AuditLabel
      - expression:
          location:
            uri: benchmark://source/src/service.rs
            range:
              start: { line: 51, character: 34 }
              end: { line: 51, character: 39 }
          kind: variable
          displayName: event
        expectedType:
          location:
            uri: benchmark://source/src/service.rs
            range:
              start: { line: 40, character: 11 }
              end: { line: 40, character: 21 }
          kind: type
          displayName: AuditEvent
    verification:
      method: manual_inspection
      notes: >
        Reviewed as correct by DavidBakerEffendi on 2026-07-17. Type-definition
        lookup on local_label reaches AuditLabel, and lookup on the event
        parameter use reaches AuditEvent. formatter is intentionally outside
        this focused case rather than asserted absent.
  - id: rust-imported-type-and-member-type-lookup
    usageLookups: []
    typeLookups:
      - expression:
          location:
            uri: benchmark://source/src/lib.rs
            range:
              start: { line: 17, character: 42 }
              end: { line: 17, character: 51 }
          kind: variable
          displayName: formatter
        expectedType:
          location:
            uri: benchmark://source/src/service.rs
            range:
              start: { line: 34, character: 11 }
              end: { line: 34, character: 25 }
          kind: type
          displayName: AuditFormatter
      - expression:
          location:
            uri: benchmark://source/src/service.rs
            range:
              start: { line: 51, character: 40 }
              end: { line: 51, character: 45 }
          kind: field
          displayName: label
        expectedType:
          location:
            uri: benchmark://source/src/service.rs
            range:
              start: { line: 36, character: 11 }
              end: { line: 36, character: 21 }
          kind: type
          displayName: AuditLabel
    verification:
      method: manual_inspection
      notes: >
        Reviewed as correct by DavidBakerEffendi on 2026-07-17. The formatter
        argument's explicit local annotation resolves through the re-export to
        AuditFormatter, while event.label resolves through the known AuditEvent
        receiver and the field's declared AuditLabel type.
