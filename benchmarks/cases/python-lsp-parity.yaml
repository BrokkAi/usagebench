        exactly to the decorated getter definition.
  - id: python-parity-dunder-getattr-not-planned
    notPlanned:
      reason: Python __getattr__ dynamic attribute fallback is retained for parity tracking but is not scored until dynamic member lookup has a deliberate model.
    declaration:
      location:
        uri: benchmark://source/src/shop/models.py
        range:
          start: { line: 21, character: 8 }
          end: { line: 21, character: 19 }
      kind: method
      displayName: __getattr__
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/tests/test_models.py
            range:
              start: { line: 8, character: 7 }
              end: { line: 8, character: 12 }
          kind: property
          displayName: theme
        expectedDeclaration:
          location:
            uri: benchmark://source/src/shop/models.py
            range:
              start: { line: 21, character: 8 }
              end: { line: 21, character: 19 }
          kind: method
          displayName: __getattr__
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-23. theme is not an ordinary
        same-name property or __getattr__ reference. It remains notPlanned as
        an aspirational runtime-fallback definition lookup because config has
        exact DynamicConfig type, theme is not otherwise declared, and Python
        therefore invokes DynamicConfig.__getattr__. DynamicConfig construction
        and the key parameter are separate identities.
        Parity source: microsoft/pyright@433e84d82d7944d129dbc239499d13eaae5f81ac.
        Upstream reference: packages/pyright-internal/src/tests/samples/memberAccess19.py.
        Adapted fixture: fixtures/python/lsp-parity/.
        Maturity: config.theme is intentionally unscored because the attribute is synthesized by __getattr__.
        Pyright 1.1.411 returned no definition from config.theme, confirming
        that notPlanned remains the appropriate current baseline.
