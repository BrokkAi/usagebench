              start: { line: 16, character: 8 }
              end: { line: 16, character: 19 }
          kind: method
          displayName: format_name
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-23. Account is a direct import
        alias for User, not a subclass. Account.format_name() is therefore the
        sole format_name usage and definition navigation targets
        User.format_name. The class qualifier, decorator, parameter, and
        name.title() call are separate identities.
        Parity source: microsoft/pyright@433e84d82d7944d129dbc239499d13eaae5f81ac.
        Upstream reference: packages/pyright-internal/src/tests/samples/decorator6.py and staticmethod evaluator scenarios.
        Adapted fixture: fixtures/python/lsp-parity/.
        Maturity: @staticmethod calls through an imported class alias should resolve to the decorated method declaration.
        Pyright 1.1.411 returned only Account.format_name() and navigated
        exactly to User.format_name.
