schemaVersion: 1
positionEncoding: utf-16
source:
  kind: fixture
  path: fixtures/python/lsp-parity
language: python
cases:
  - id: python-parity-reexported-class-alias-classmethod
    expectedFailure:
      reason: Bifrost baseline resolves this decorated re-exported class alias to the decorator line instead of the class token; tracked in bifrost#413.
    declaration:
      location:
        uri: benchmark://source/src/shop/models.py
        range:
          start: { line: 4, character: 6 }
          end: { line: 4, character: 10 }
      kind: class
      displayName: User
    expectedUsages:
      - location:
          uri: benchmark://source/tests/test_models.py
          range:
            start: { line: 3, character: 7 }
            end: { line: 3, character: 14 }
        kind: class
        displayName: Account
    usageLookups:
      - usage:
          location:
            uri: benchmark://source/tests/test_models.py
            range:
              start: { line: 3, character: 7 }
              end: { line: 3, character: 14 }
          kind: class
          displayName: Account
        expectedDeclaration:
          location:
            uri: benchmark://source/src/shop/models.py
            range:
              start: { line: 4, character: 6 }
              end: { line: 4, character: 10 }
          kind: class
          displayName: User
    verification:
      method: analyzer_comparison
      notes: >
        Parity source: microsoft/pyright@433e84d82d7944d129dbc239499d13eaae5f81ac.
        Upstream reference: packages/pyright-internal/src/tests/importResolver.test.ts import alias and private import usage scenarios.
        Adapted fixture: fixtures/python/lsp-parity/.
        Maturity: from .models import User as Account re-exports the class, and Account.guest should keep the class alias tied back to User.
  - id: python-parity-classmethod-call
    expectedFailure:
      reason: Bifrost baseline cannot resolve classmethod calls across this Python package import alias boundary; tracked in bifrost#413.
    declaration:
      location:
        uri: benchmark://source/src/shop/models.py
        range:
          start: { line: 12, character: 8 }
          end: { line: 12, character: 13 }
      kind: method
      displayName: guest
    expectedUsages:
      - location:
          uri: benchmark://source/tests/test_models.py
          range:
            start: { line: 3, character: 15 }
            end: { line: 3, character: 20 }
        kind: method
        displayName: guest
    usageLookups:
      - usage:
          location:
            uri: benchmark://source/tests/test_models.py
            range:
              start: { line: 3, character: 15 }
              end: { line: 3, character: 20 }
          kind: method
          displayName: guest
        expectedDeclaration:
          location:
            uri: benchmark://source/src/shop/models.py
            range:
              start: { line: 12, character: 8 }
              end: { line: 12, character: 13 }
          kind: method
          displayName: guest
    verification:
      method: analyzer_comparison
      notes: >
        Parity source: microsoft/pyright@433e84d82d7944d129dbc239499d13eaae5f81ac.
        Upstream reference: packages/pyright-internal/src/tests/samples/decorator6.py and classmethod evaluator scenarios.
        Adapted fixture: fixtures/python/lsp-parity/.
        Maturity: @classmethod calls through an imported class alias should resolve to the decorated method declaration.
  - id: python-parity-staticmethod-call
    expectedFailure:
      reason: Bifrost baseline cannot resolve staticmethod calls across this Python package import alias boundary; tracked in bifrost#413.
    declaration:
      location:
        uri: benchmark://source/src/shop/models.py
        range:
          start: { line: 16, character: 8 }
          end: { line: 16, character: 19 }
      kind: method
      displayName: format_name
    expectedUsages:
      - location:
          uri: benchmark://source/tests/test_models.py
          range:
            start: { line: 4, character: 8 }
            end: { line: 4, character: 19 }
        kind: method
        displayName: format_name
    usageLookups:
      - usage:
          location:
            uri: benchmark://source/tests/test_models.py
            range:
              start: { line: 4, character: 8 }
              end: { line: 4, character: 19 }
          kind: method
          displayName: format_name
        expectedDeclaration:
          location:
            uri: benchmark://source/src/shop/models.py
            range:
              start: { line: 16, character: 8 }
              end: { line: 16, character: 19 }
          kind: method
          displayName: format_name
    verification:
      method: analyzer_comparison
      notes: >
        Parity source: microsoft/pyright@433e84d82d7944d129dbc239499d13eaae5f81ac.
        Upstream reference: packages/pyright-internal/src/tests/samples/decorator6.py and staticmethod evaluator scenarios.
        Adapted fixture: fixtures/python/lsp-parity/.
        Maturity: @staticmethod calls through an imported class alias should resolve to the decorated method declaration.
  - id: python-parity-property-getter-access
    expectedFailure:
      reason: Bifrost baseline cannot resolve Python property getter reads through the inferred instance; tracked in bifrost#414.
    declaration:
      location:
        uri: benchmark://source/src/shop/models.py
        range:
          start: { line: 8, character: 8 }
          end: { line: 8, character: 23 }
      kind: property
      displayName: normalized_name
    expectedUsages:
      - location:
          uri: benchmark://source/tests/test_models.py
          range:
            start: { line: 5, character: 5 }
            end: { line: 5, character: 20 }
        kind: property
        displayName: normalized_name
    usageLookups:
      - usage:
          location:
            uri: benchmark://source/tests/test_models.py
            range:
              start: { line: 5, character: 5 }
              end: { line: 5, character: 20 }
          kind: property
          displayName: normalized_name
        expectedDeclaration:
          location:
            uri: benchmark://source/src/shop/models.py
            range:
              start: { line: 8, character: 8 }
              end: { line: 8, character: 23 }
          kind: property
          displayName: normalized_name
    verification:
      method: analyzer_comparison
      notes: >
        Parity source: microsoft/pyright@433e84d82d7944d129dbc239499d13eaae5f81ac.
        Upstream reference: packages/pyright-internal/src/tests/samples/property1.py and property evaluator scenarios.
        Adapted fixture: fixtures/python/lsp-parity/.
        Maturity: @property getter access through an inferred instance should resolve to the property method declaration.
  - id: python-parity-dunder-getattr-unsupported
    unsupported:
      reason: Python __getattr__ dynamic attribute fallback is retained for parity tracking but is not scored until dynamic member lookup has a deliberate model.
    declaration:
      location:
        uri: benchmark://source/src/shop/models.py
        range:
          start: { line: 21, character: 8 }
          end: { line: 21, character: 19 }
      kind: method
      displayName: __getattr__
    usageLookups:
      - usage:
          location:
            uri: benchmark://source/tests/test_models.py
            range:
              start: { line: 8, character: 7 }
              end: { line: 8, character: 12 }
          kind: property
          displayName: theme
        expectedDeclaration:
          location:
            uri: benchmark://source/src/shop/models.py
            range:
              start: { line: 21, character: 8 }
              end: { line: 21, character: 19 }
          kind: method
          displayName: __getattr__
    verification:
      method: analyzer_comparison
      notes: >
        Parity source: microsoft/pyright@433e84d82d7944d129dbc239499d13eaae5f81ac.
        Upstream reference: packages/pyright-internal/src/tests/samples/memberAccess19.py.
        Adapted fixture: fixtures/python/lsp-parity/.
        Maturity: config.theme is intentionally unscored because the attribute is synthesized by __getattr__.
