        annotation, while a second query from Account exposes the alias-side
        export, import, and runtime qualifiers. The LSP runner unions those
        responses and records the probe itself; the combined result and
        Account-to-User definition lookup pass exactly.
  - id: python-parity-classmethod-call
    declaration:
      location:
        uri: benchmark://source/src/shop/models.py
        range:
          start: { line: 12, character: 8 }
          end: { line: 12, character: 13 }
      kind: method
      displayName: guest
    expectedUsages:
      - location:
          uri: benchmark://source/tests/test_models.py
          range:
            start: { line: 3, character: 15 }
            end: { line: 3, character: 20 }
        kind: method
        displayName: guest
    usageLookups:
      - operation: definition
        usage:
          location:
            uri: benchmark://source/tests/test_models.py
            range:
              start: { line: 3, character: 15 }
              end: { line: 3, character: 20 }
          kind: method
          displayName: guest
        expectedDeclaration:
          location:
            uri: benchmark://source/src/shop/models.py
            range:
              start: { line: 12, character: 8 }
              end: { line: 12, character: 13 }
          kind: method
          displayName: guest
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-23. Account.guest() is the
        sole guest method usage and definition navigation targets User.guest.
        Account is a separate class reference; cls and @classmethod are not
        guest usages.
        Parity source: microsoft/pyright@433e84d82d7944d129dbc239499d13eaae5f81ac.
        Upstream reference: packages/pyright-internal/src/tests/samples/decorator6.py and classmethod evaluator scenarios.
        Adapted fixture: fixtures/python/lsp-parity/.
        Maturity: @classmethod calls through an imported class alias should resolve to the decorated method declaration.
        Pyright 1.1.411 returned only Account.guest() and navigated exactly to
        User.guest.
