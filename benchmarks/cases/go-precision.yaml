          kind: method
          displayName: Record
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-22. The Recorder-typed call is
        the required interface usage. Both concrete Worker calls are unproven
        implementation-family candidates. Declaration navigation targets the
        bodyless interface member; assigning worker to the interface local does
        not change the call's static identity or prevent later reassignment.
        gopls 0.23.0 returned the exact two-tier usage family but does not
        advertise textDocument/declaration. Bifrost at commit
        4b1dd6456fe0d7ee6786ede958240f0deba4fd8f found the required interface
        call but omitted both conservative concrete implementation-family
        candidates; its separate declaration lookup is unsupported.
