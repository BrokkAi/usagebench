          kind: method
          displayName: Record
    verification:
      method: manual_inspection
      notes: >
        Reviewed by DavidBakerEffendi on 2026-07-22. The dot-imported
        constructor seeds exact Worker receivers, including the second binding
        of a tuple assignment, and both Record calls navigate to the concrete
        method body. The Recorder-typed call retains its static interface
        identity while remaining an unproven implementation-family candidate.
        gopls 0.23.0 returned that exact two-tier usage set and both definition
        targets. Bifrost at commit
        4b1dd6456fe0d7ee6786ede958240f0deba4fd8f matched the usage set but
        rejected both definition lookups as shadowed by a local Go binding.
