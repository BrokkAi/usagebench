name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  usagebench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Run Rust tests
        run: cargo test
      - name: Validate benchmark cases
        run: cargo run -- validate benchmarks/cases

  pygen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pygen/pyproject.toml"
      - name: Install dependencies
        working-directory: pygen
        run: uv sync
      - name: Run tests
        working-directory: pygen
        run: uv run pytest

  javagen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'sbt'
      - uses: sbt/setup-sbt@v1
      - name: Run tests
        working-directory: javagen
        run: sbt test

  gogen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Tidy dependencies
        working-directory: gogen
        run: go mod tidy
      - name: Run tests
        working-directory: gogen
        run: go test -v ./...
