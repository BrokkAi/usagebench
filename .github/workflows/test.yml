name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  usagebench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Run Rust tests
        run: cargo test
      - name: Validate benchmark cases
        run: cargo run -- validate benchmarks/cases
      - name: Validate citation metadata
        uses: citation-file-format/cffconvert-github-action@2.0.0
        with:
          args: '--validate'
