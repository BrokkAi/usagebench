name: Benchmark

on:
  schedule:
    - cron: '47 9 * * *'
  workflow_dispatch:
    inputs:
      bifrost_ref:
        description: 'Bifrost ref or commit to benchmark'
        required: false
        default: 'master'
        type: string
      include_unsupported:
        description: 'Run cases marked unsupported'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: usagebench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    outputs:
      slack_payload: ${{ steps.slack_payload.outputs.payload }}
    env:
      BIFROST_REF: ${{ inputs.bifrost_ref || 'master' }}

    steps:
      - name: Checkout usagebench
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout Bifrost
        uses: actions/checkout@v4
        with:
          repository: BrokkAi/bifrost
          path: bifrost
          ref: ${{ env.BIFROST_REF }}
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.BIFROST_CHECKOUT_TOKEN || github.token }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo + target
        uses: swatinem/rust-cache@v2

      - name: Build usagebench
        run: cargo build --locked --bin usagebench

      - name: Validate benchmark cases
        run: ./target/debug/usagebench validate benchmarks/cases

      - name: Run Bifrost usage benchmark
        id: run_usagebench
        continue-on-error: true
        shell: bash
        env:
          INCLUDE_UNSUPPORTED: ${{ inputs.include_unsupported || false }}
        run: |
          set -euo pipefail
          mkdir -p benchmark-output
          args=(
            run-bifrost
            benchmarks/cases
            --bifrost-repo bifrost
            --bifrost-commit "$BIFROST_REF"
            --work-dir target/usagebench
            --output "benchmark-output/run-${GITHUB_RUN_ID}.json"
          )
          if [ "$INCLUDE_UNSUPPORTED" = "true" ]; then
            args+=(--include-unsupported)
          fi
          ./target/debug/usagebench "${args[@]}"

      - name: Resolve benchmark paths
        id: paths
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          report_path="benchmark-output/run-${GITHUB_RUN_ID}.json"
          if [ ! -f "$report_path" ]; then
            report_path=""
          fi
          echo "report_path=${report_path}" >> "$GITHUB_OUTPUT"

      - name: Record UsageBench provenance
        id: usagebench_provenance
        if: always()
        shell: bash
        env:
          REPORT_PATH: ${{ steps.paths.outputs.report_path }}
        run: |
          set -euo pipefail
          report_path="$REPORT_PATH"
          revision="${GITHUB_SHA}"
          release=""
          if [ -n "$report_path" ] && [ -f "$report_path" ]; then
            revision="$(jq -r '.usagebenchRevision // ""' "$report_path")"
            release="$(jq -r '.usagebenchRelease // ""' "$report_path")"
          fi
          if [[ ! "$revision" =~ ^[0-9a-fA-F]{40}(-dirty)?$ ]]; then
            echo "Ignoring invalid UsageBench revision from report" >&2
            revision="$GITHUB_SHA"
            release=""
          fi
          if [[ -n "$release" && ! "$release" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Ignoring invalid UsageBench release from report" >&2
            release=""
          fi
          artifact_label="${release:-${revision:0:12}}"
          {
            echo "revision=$revision"
            echo "release=$release"
            echo "artifact_label=$artifact_label"
          } >> "$GITHUB_OUTPUT"

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: usagebench-${{ steps.usagebench_provenance.outputs.artifact_label }}-${{ github.run_id }}
          path: benchmark-output
          if-no-files-found: warn
          retention-days: 14

      - name: Publish benchmark summary
        if: always()
        shell: bash
        env:
          RUN_OUTCOME: ${{ steps.run_usagebench.outcome }}
          USAGEBENCH_REVISION: ${{ steps.usagebench_provenance.outputs.revision }}
          USAGEBENCH_RELEASE: ${{ steps.usagebench_provenance.outputs.release }}
          REPORT_PATH: ${{ steps.paths.outputs.report_path }}
        run: |
          set -euo pipefail
          {
            echo "# Usage Benchmark"
            echo
            echo "- Run step: $RUN_OUTCOME"
            echo "- UsageBench revision: \`$USAGEBENCH_REVISION\`"
            if [ -n "$USAGEBENCH_RELEASE" ]; then
              echo "- UsageBench release: \`$USAGEBENCH_RELEASE\`"
            fi
            echo "- Bifrost ref: \`${BIFROST_REF}\`"
            if [ -n "$REPORT_PATH" ]; then
              echo "- Report: \`$REPORT_PATH\`"
              echo
              echo "## Totals"
              echo
              jq -r '
                .totals
                | "- Documents: \(.documents)\n- Planned cases: \(.cases)\n- Passed: \(.passed)\n- Failed: \(.failed)\n- Expected failures: \(.expectedFailures)\n- Not planned: \(.notPlanned // 0)\n- Unsupported: \(.unsupported // 0)\n- Skipped: \(.skipped)\n- Errors: \(.errors)"
              ' "$REPORT_PATH"
              failing_cases="$(
                jq -r '
                  [
                    .documents[]? as $document
                    | $document.cases[]?
                    | select(.status == "failed" or .status == "error")
                    | "- \(.status): \(.id) (\($document.caseFile))"
                      + (
                        if .declarationToUsages then
                          " missing=\(.declarationToUsages.missing | length), extra=\(.declarationToUsages.unexpected | length)"
                        else
                          ""
                        end
                      )
                      + (
                        ((.usageToDeclaration // []) | map(select(.status == "failed" or .status == "error")) | length) as $usage_issues
                        | if $usage_issues > 0 then
                            " usageLookupIssues=\($usage_issues)"
                          else
                            ""
                          end
                      )
                  ] as $items
                  | if ($items | length) > 0 then
                      ($items[0:10][]),
                      (if ($items | length) > 10 then "- ... \(($items | length) - 10) more failing case(s)" else empty end)
                    else
                      empty
                    end
                ' "$REPORT_PATH"
              )"
              if [ -n "$failing_cases" ]; then
                echo
                echo "## Failing Cases"
                echo
                echo "$failing_cases"
              fi
            else
              echo "- Report: none written"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Prepare Slack payload
        id: slack_payload
        if: always()
        continue-on-error: true
        shell: bash
        env:
          RUN_OUTCOME: ${{ steps.run_usagebench.outcome }}
          REPORT_PATH: ${{ steps.paths.outputs.report_path }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          USAGEBENCH_REVISION: ${{ steps.usagebench_provenance.outputs.revision }}
          USAGEBENCH_RELEASE: ${{ steps.usagebench_provenance.outputs.release }}
        run: |
          set -euo pipefail

          run_outcome="$RUN_OUTCOME"
          report_path="$REPORT_PATH"
          head_sha_short="$(git rev-parse --short "$GITHUB_SHA")"

          bifrost_resolved_commit=""
          bifrost_sha_short=""
          cases_count="0"
          passed_count="0"
          improved_count="0"
          total_passed_count="0"
          failed_count="0"
          expected_failures_count="0"
          not_planned_count="0"
          unsupported_count="0"
          skipped_count="0"
          errors_count="0"
          failing_cases=""
          if [ -n "$report_path" ] && [ -f "$report_path" ]; then
            bifrost_resolved_commit="$(jq -r '.bifrostResolvedCommit // ""' "$report_path")"
            bifrost_sha_short="$(printf '%s' "$bifrost_resolved_commit" | cut -c1-7)"
            cases_count="$(jq -r '.totals.cases // 0' "$report_path")"
            passed_count="$(jq -r '.totals.passed // 0' "$report_path")"
            improved_count="$(jq -r '.totals.improved // 0' "$report_path")"
            total_passed_count="$((passed_count + improved_count))"
            failed_count="$(jq -r '.totals.failed // 0' "$report_path")"
            expected_failures_count="$(jq -r '.totals.expectedFailures // 0' "$report_path")"
            not_planned_count="$(jq -r '.totals.notPlanned // 0' "$report_path")"
            unsupported_count="$(jq -r '.totals.unsupported // 0' "$report_path")"
            skipped_count="$(jq -r '.totals.skipped // 0' "$report_path")"
            errors_count="$(jq -r '.totals.errors // 0' "$report_path")"
            failing_cases="$(
              jq -r '
                [
                  .documents[]? as $document
                  | $document.cases[]?
                  | select(.status == "failed" or .status == "error")
                  | "- \(.status): \(.id) (\($document.caseFile))"
                    + (
                      if .declarationToUsages then
                        " missing=\(.declarationToUsages.missing | length), extra=\(.declarationToUsages.unexpected | length)"
                      else
                        ""
                      end
                    )
                    + (
                      ((.usageToDeclaration // []) | map(select(.status == "failed" or .status == "error")) | length) as $usage_issues
                      | if $usage_issues > 0 then
                          " usageLookupIssues=\($usage_issues)"
                        else
                          ""
                        end
                    )
                ] as $items
                | if ($items | length) > 0 then
                    ($items[0:10][]),
                    (if ($items | length) > 10 then "- ... \(($items | length) - 10) more failing case(s)" else empty end)
                  else
                    empty
                  end
              ' "$report_path"
            )"
          fi

          ok="true"
          error_text=""
          if [ "$run_outcome" != "success" ]; then
            ok="false"
            if [ -n "$failing_cases" ]; then
              error_text="$(printf 'Usage benchmark run failed:\n%s' "$failing_cases")"
            elif [ -n "$report_path" ]; then
              error_text="usage benchmark run failed; report did not list failed cases"
            else
              error_text="usage benchmark run failed before writing a report"
            fi
          elif [ "$failed_count" != "0" ] || [ "$errors_count" != "0" ]; then
            ok="false"
            if [ -n "$failing_cases" ]; then
              error_text="$(printf 'Usage benchmark report recorded failures:\n%s' "$failing_cases")"
            else
              error_text="usage benchmark report recorded failures"
            fi
          fi

          payload="$(
            jq -nc \
              --arg error_text "$error_text" \
              --arg workflow_run_url "$WORKFLOW_RUN_URL" \
              --arg head_sha_short "$head_sha_short" \
              --arg usagebench_revision "$USAGEBENCH_REVISION" \
              --arg usagebench_release "$USAGEBENCH_RELEASE" \
              --arg bifrost_ref "$BIFROST_REF" \
              --arg bifrost_sha_short "$bifrost_sha_short" \
              --arg run_outcome "$run_outcome" \
              --argjson ok "$ok" \
              --argjson cases_count "$cases_count" \
              --argjson passed_count "$passed_count" \
              --argjson improved_count "$improved_count" \
              --argjson total_passed_count "$total_passed_count" \
              --argjson failed_count "$failed_count" \
              --argjson expected_failures_count "$expected_failures_count" \
              --argjson not_planned_count "$not_planned_count" \
              --argjson unsupported_count "$unsupported_count" \
              --argjson skipped_count "$skipped_count" \
              --argjson errors_count "$errors_count" \
              '{
                ok: $ok,
                error_text: $error_text,
                workflow_run_url: $workflow_run_url,
                head_sha_short: $head_sha_short,
                usagebench_revision: $usagebench_revision,
                usagebench_release: $usagebench_release,
                bifrost_ref: $bifrost_ref,
                bifrost_sha_short: $bifrost_sha_short,
                run_outcome: $run_outcome,
                cases_count: $cases_count,
                passed_count: $passed_count,
                improved_count: $improved_count,
                total_passed_count: $total_passed_count,
                failed_count: $failed_count,
                expected_failures_count: $expected_failures_count,
                not_planned_count: $not_planned_count,
                unsupported_count: $unsupported_count,
                skipped_count: $skipped_count,
                errors_count: $errors_count
              }'
          )"

          {
            echo 'payload<<EOF'
            echo "$payload"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Enforce benchmark outcome
        if: always()
        shell: bash
        env:
          RUN_OUTCOME: ${{ steps.run_usagebench.outcome }}
        run: |
          set -euo pipefail
          if [ "$RUN_OUTCOME" != "success" ]; then
            echo "usage benchmark run failed" >&2
            exit 1
          fi

  notify:
    name: notify Slack
    needs: benchmark
    if: always() && needs.benchmark.outputs.slack_payload != ''
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Check Slack configuration
        id: slack_config
        shell: bash
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_DAILY_USAGEBENCH_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send benchmark data to Slack Workflow
        if: steps.slack_config.outputs.enabled == 'true'
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.1.1
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_DAILY_USAGEBENCH_WEBHOOK_URL }}
        with:
          webhook: ${{ env.SLACK_WEBHOOK }}
          webhook-type: webhook-trigger
          payload: ${{ needs.benchmark.outputs.slack_payload }}
