name: Release benchmark

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing benchmark tag to release (for example v0.1.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: validate and package
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.name }}
      version: ${{ steps.tag.outputs.version }}
      commit: ${{ steps.tag.outputs.commit }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ inputs.tag && format('refs/tags/{0}', inputs.tag) || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve and verify tag
        id: tag
        shell: bash
        env:
          RELEASE_TAG_INPUT: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG_INPUT:-${GITHUB_REF_NAME}}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vMAJOR.MINOR.PATCH: $tag" >&2
            exit 1
          fi
          tag_commit="$(git rev-list -n 1 "refs/tags/$tag")"
          head_commit="$(git rev-parse HEAD)"
          if [ "$tag_commit" != "$head_commit" ]; then
            echo "Checked-out commit $head_commit does not match $tag ($tag_commit)" >&2
            exit 1
          fi
          git fetch --no-tags origin refs/heads/main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$head_commit" refs/remotes/origin/main; then
            echo "Release commit $head_commit is not reachable from origin/main" >&2
            exit 1
          fi
          version="${tag#v}"
          cff_version="$(sed -n 's/^version: "\([^"]*\)"/\1/p' CITATION.cff)"
          if [ "$cff_version" != "$version" ]; then
            echo "CITATION.cff version $cff_version does not match release $version" >&2
            exit 1
          fi
          {
            echo "name=$tag"
            echo "version=$version"
            echo "commit=$head_commit"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable

      - name: Cache cargo + target
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Test harness
        run: cargo test --locked

      - name: Validate benchmark cases
        run: cargo run --locked -- validate benchmarks/cases

      - name: Validate citation metadata
        uses: citation-file-format/cffconvert-github-action@4cf11baa70a673bfdf9dad0acc7ee33b3f4b6084 # 2.0.0
        with:
          args: '--validate'

      - name: Stage minimal reproducibility bundle
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.name }}
          RELEASE_COMMIT: ${{ steps.tag.outputs.commit }}
        run: |
          set -euo pipefail
          stage="usagebench-${RELEASE_TAG}"
          scripts/stage-release-bundle.sh . "dist/$stage" "$RELEASE_TAG" "$RELEASE_COMMIT"
          tar -C dist -czf "dist/$stage.tar.gz" "$stage"
          (
            cd dist
            sha256sum "$stage.tar.gz" > "$stage.tar.gz.sha256"
          )

      - name: Upload release assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-assets
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error
          retention-days: 1

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment: release
    steps:
      - name: Download release assets
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: release-assets
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: ${{ needs.build.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.sha256
